<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>पुढची - मागची संख्या खेळ</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    /* बेसिक डिझाइन व थीम्स */
    :root {
      --bg-color: #0b192c;
      --card-bg: #1e3e62;
      --accent-color: #00d2ff;
      --text-color: #ffffff;
      --btn-color: #0084ff;
    }

    body.theme-jungle {
      --bg-color: #1b4332;
      --card-bg: #2d6a4f;
      --accent-color: #52b788;
      --text-color: #d8f3dc;
      --btn-color: #40916c;
    }

    body.theme-candy {
      --bg-color: #4a154b;
      --card-bg: #6b1d5c;
      --accent-color: #ff70a6;
      --text-color: #ffeafa;
      --btn-color: #ff9770;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      text-align: center;
      padding: 10px;
      margin: 0;
      user-select: none;
      touch-action: manipulation;
      transition: background-color 0.4s;
    }

    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      max-width: 600px;
      margin: 10px auto;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn-custom, .level-select, .theme-select {
      padding: 6px 12px;
      font-weight: bold;
      border: 1px solid var(--accent-color);
      border-radius: 20px;
      cursor: pointer;
      background-color: var(--card-bg);
      color: var(--text-color);
      font-size: 13px;
    }

    .btn-custom.active {
      background-color: var(--accent-color);
      color: #000;
    }

    .info-badge {
      background-color: #ff6500;
      color: #fff;
      padding: 6px 14px;
      border-radius: 15px;
      font-weight: bold;
      font-size: 14px;
    }

    .streak-badge {
      background-color: #ffd700;
      color: #000;
      padding: 6px 12px;
      border-radius: 15px;
      font-weight: bold;
      font-size: 14px;
    }

    .mode-buttons {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 12px 0;
      flex-wrap: wrap;
    }

    .btn-mode {
      padding: 8px 12px;
      border: 1px solid var(--accent-color);
      border-radius: 8px;
      background-color: transparent;
      color: var(--text-color);
      cursor: pointer;
      font-size: 13px;
    }

    .btn-mode.active {
      background-color: var(--accent-color);
      color: #000;
      font-weight: bold;
    }

    .question-title {
      font-size: 18px;
      margin: 10px 0;
      font-weight: 500;
    }

    /* ३ मुख्य बॉक्स */
    .boxes-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px 0;
    }

    .box {
      width: 80px;
      height: 80px;
      border: 3px solid var(--accent-color);
      border-radius: 15px;
      background-color: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .box.drop-zone {
      border: 3px dashed #ff8800;
      background-color: rgba(255, 255, 255, 0.05);
      color: #ff8800;
    }

    .box.correct-highlight {
      border-color: #00ff66 !important;
      background-color: rgba(0, 255, 102, 0.2) !important;
      color: #00ff66 !important;
    }

    .options-title {
      font-size: 15px;
      margin-top: 10px;
      color: var(--accent-color);
    }

    .options-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 12px 0;
      flex-wrap: wrap;
      min-height: 70px;
    }

    .option-card {
      width: 60px;
      height: 60px;
      background-color: var(--btn-color);
      color: white;
      font-size: 24px;
      font-weight: bold;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      transition: transform 0.2s, background-color 0.2s;
      touch-action: none;
    }

    .option-card:active, .option-card.selected {
      transform: scale(1.1);
      background-color: #ff8800;
    }

    .action-btn-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-check, .btn-next {
      background-color: #00e676;
      color: #000;
      font-weight: bold;
      border: none;
      padding: 10px 22px;
      font-size: 16px;
      border-radius: 25px;
      cursor: pointer;
    }

    .btn-next {
      background-color: #ff9100;
      display: none;
    }

    .feedback-message {
      font-size: 18px;
      font-weight: bold;
      min-height: 28px;
      margin: 8px 0;
    }
    .feedback-message.correct { color: #00ff66; }
    .feedback-message.wrong { color: #ff3333; }
  </style>
</head>
<body id="game-body">

  <!-- टॉप बार कंट्रोल -->
  <div class="top-bar">
    <div>
      <button class="btn-custom active" id="btn-marathi" onclick="switchLanguage('marathi')">मराठी</button>
      <button class="btn-custom" id="btn-english" onclick="switchLanguage('english')">English</button>
    </div>

    <button class="btn-custom" id="btn-mute" onclick="toggleMute()">🔊 Voice: ON</button>
    <button class="btn-custom" id="btn-timer-toggle" onclick="toggleTimerMode()">⏱️ Timer: OFF</button>

    <select class="theme-select" onchange="changeTheme(this.value)">
      <option value="space">🌌 Space Theme</option>
      <option value="jungle">🌿 Jungle Theme</option>
      <option value="candy">🍬 Candy Theme</option>
    </select>

    <select class="level-select" id="level-select" onchange="changeLevel(this.value)">
      <option value="easy">Easy (1-20)</option>
      <option value="medium">Medium (1-100)</option>
      <option value="hard">Hard (100-1000)</option>
    </select>

    <div class="info-badge" id="timer-text" style="display:none;">वेळ: ३०</div>
    <div class="info-badge" id="score-text">गुण: ०</div>
    <div class="streak-badge" id="streak-text">⭐ ०</div>
  </div>

  <!-- गेम मोड्स -->
  <div class="mode-buttons">
    <button class="btn-mode" id="mode-before" onclick="setMode('before')">Before Number</button>
    <button class="btn-mode" id="mode-after" onclick="setMode('after')">After Number</button>
    <button class="btn-mode" id="mode-middle" onclick="setMode('middle')">Middle Number</button>
  </div>

  <div class="question-title" id="question-text">पुढील संख्या सांगा:</div>

  <div class="boxes-container">
    <div class="box" id="box1"></div>
    <div class="box" id="box2"></div>
    <div class="box" id="box3"></div>
  </div>

  <div class="feedback-message" id="feedback"></div>

  <div class="options-title" id="options-label">योग्य अंक निवडा किंवा ड्रॅग करा:</div>
  <div class="options-container" id="options-box"></div>

  <div class="action-btn-group">
    <button class="btn-check" id="check-btn" onclick="checkAnswer()">Check Answer</button>
    <button class="btn-next" id="next-btn" onclick="generateQuestion()">Next Question ➔</button>
  </div>
<script>
    const langData = {
      marathi: {
        scoreText: "गुण: ",
        timerText: "वेळ: ",
        btnBefore: "पूर्वीची संख्या (Before)",
        btnAfter: "पुढील संख्या (After)",
        btnMiddle: "मधील संख्या (Middle)",
        qBefore: "आधीची संख्या रिकाम्या बॉक्समध्ये टाका:",
        qAfter: "नंतरची संख्या रिकाम्या बॉक्समध्ये टाका:",
        qMiddle: "मधील संख्या रिकाम्या बॉक्समध्ये टाका:",
        optionsLabel: "योग्य अंक निवडा किंवा ड्रॅग करा:",
        checkBtn: "उत्तर तपासा",
        nextBtn: "पुढील प्रश्न ➔",
        correctMsg: "शाब्बास! बरोबर उत्तर! 🎉",
        wrongMsg: "चुकले! पुन्हा प्रयत्न करा. ❌",
        revealMsg: "योग्य उत्तर हे आहे: ",
        selectMsg: "कृपया आधी एक संख्या निवडा!",
        timeUpMsg: "वेळ संपली! एकूण गुण: ",
        speechLang: "mr-IN",
        levels: { easy: "सोपे (१-२०)", medium: "मध्यम (१-१००)", hard: "कठीण (१००-१०००)" }
      },
      english: {
        scoreText: "SCORE: ",
        timerText: "TIME: ",
        btnBefore: "Before Number",
        btnAfter: "After Number",
        btnMiddle: "Middle Number",
        qBefore: "Place the correct BEFORE number:",
        qAfter: "Place the correct AFTER number:",
        qMiddle: "Place the correct MIDDLE number:",
        optionsLabel: "Select or drag the correct number:",
        checkBtn: "Check Answer",
        nextBtn: "Next Question ➔",
        correctMsg: "Great Job! Correct Answer! 🎉",
        wrongMsg: "Wrong Answer! Try again. ❌",
        revealMsg: "The correct answer is: ",
        selectMsg: "Please select a number first!",
        timeUpMsg: "Time's up! Score: ",
        speechLang: "en-US",
        levels: { easy: "Easy (1-20)", medium: "Medium (1-100)", hard: "Hard (100-1000)" }
      }
    };

    let currentLang = 'marathi';
    let currentMode = 'after';
    let currentLevel = 'easy';
    let currentNumber = 10;
    let correctAnswer = 11;
    let selectedAnswer = null;
    let score = 0;
    let streak = 0;
    let wrongAttempts = 0;

    let isAudioOn = true;
    let isTimerActive = false;
    let timeLeft = 30;
    let timerInterval = null;

    function formatNumber(num) {
      if (num === "?" || num === null) return "?";
      return currentLang === 'marathi' ? num.toLocaleString('mr-IN') : num.toString();
    }

    function speakText(text) {
      if (isAudioOn && 'speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = langData[currentLang].speechLang;
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }
    }

    function toggleMute() {
      isAudioOn = !isAudioOn;
      document.getElementById('btn-mute').innerText = isAudioOn ? "🔊 Voice: ON" : "🔇 Voice: OFF";
      if (!isAudioOn && 'speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    function changeTheme(theme) {
      const body = document.getElementById('game-body');
      body.className = '';
      if (theme !== 'space') body.classList.add('theme-' + theme);
    }

    function speakQuestionAudio() {
      let qStr = "";
      if (currentLang === 'marathi') {
        if (currentMode === 'after') qStr = formatNumber(currentNumber + 1) + " नंतर काय येते?";
        else if (currentMode === 'before') qStr = formatNumber(currentNumber) + " च्या आधी काय येते?";
        else if (currentMode === 'middle') qStr = formatNumber(currentNumber) + " आणि " + formatNumber(currentNumber + 2) + " च्या मधील संख्या सांगा";
      } else {
        if (currentMode === 'after') qStr = "What comes after " + (currentNumber + 1) + "?";
        else if (currentMode === 'before') qStr = "What comes before " + currentNumber + "?";
        else if (currentMode === 'middle') qStr = "What comes between " + currentNumber + " and " + (currentNumber + 2) + "?";
      }
      speakText(qStr);
    }

    function playAudioTone(type) {
      if (!isAudioOn) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'correct') {
          osc.frequency.setValueAtTime(523.25, ctx.currentTime);
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          osc.start();
          osc.stop(ctx.currentTime + 0.25);
        } else {
          osc.frequency.setValueAtTime(220, ctx.currentTime);
          osc.frequency.setValueAtTime(180, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          osc.start();
          osc.stop(ctx.currentTime + 0.25);
        }
      } catch (e) {}
    }

    function toggleTimerMode() {
      isTimerActive = !isTimerActive;
      const btn = document.getElementById('btn-timer-toggle');
      const timerBoard = document.getElementById('timer-text');

      btn.classList.toggle('active', isTimerActive);
      btn.innerText = isTimerActive ? "⏱️ Timer: ON" : "⏱️ Timer: OFF";
      timerBoard.style.display = isTimerActive ? "inline-block" : "none";

      score = 0;
      streak = 0;
      updateDisplay();

      if (isTimerActive) startTimer();
      else clearInterval(timerInterval);

      generateQuestion();
    }

    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = 30;
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          let msg = langData[currentLang].timeUpMsg + formatNumber(score);
          alert(msg);
          speakText(msg);
          score = 0;
          streak = 0;
          updateDisplay();
          startTimer();
          generateQuestion();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      document.getElementById('timer-text').innerText = langData[currentLang].timerText + formatNumber(timeLeft);
    }

    function switchLanguage(lang) {
      currentLang = lang;
      document.getElementById('btn-marathi').classList.toggle('active', lang === 'marathi');
      document.getElementById('btn-english').classList.toggle('active', lang === 'english');

      document.getElementById('mode-before').innerText = langData[lang].btnBefore;
      document.getElementById('mode-after').innerText = langData[lang].btnAfter;
      document.getElementById('mode-middle').innerText = langData[lang].btnMiddle;
      document.getElementById('options-label').innerText = langData[lang].optionsLabel;
      document.getElementById('check-btn').innerText = langData[lang].checkBtn;
      document.getElementById('next-btn').innerText = langData[lang].nextBtn;

      const lvlSelect = document.getElementById('level-select');
      lvlSelect.options[0].text = langData[lang].levels.easy;
      lvlSelect.options[1].text = langData[lang].levels.medium;
      lvlSelect.options[2].text = langData[lang].levels.hard;

      updateDisplay();
      if (isTimerActive) updateTimerDisplay();
      generateQuestion();
    }

    function changeLevel(level) {
      currentLevel = level;
      generateQuestion();
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('mode-before').classList.toggle('active', mode === 'before');
      document.getElementById('mode-after').classList.toggle('active', mode === 'after');
      document.getElementById('mode-middle').classList.toggle('active', mode === 'middle');
      generateQuestion();
    }

    function getRandomNumber() {
      if (currentLevel === 'easy') return Math.floor(Math.random() * 18) + 2;
      if (currentLevel === 'medium') return Math.floor(Math.random() * 95) + 3;
      return Math.floor(Math.random() * 890) + 105;
    }

    function generateQuestion() {
      selectedAnswer = null;
      wrongAttempts = 0;
      document.getElementById('feedback').innerText = '';
      document.getElementById('check-btn').style.display = 'inline-block';
      document.getElementById('next-btn').style.display = 'none';

      currentNumber = getRandomNumber();
      
      const b1 = document.getElementById('box1');
      const b2 = document.getElementById('box2');
      const b3 = document.getElementById('box3');
      const qText = document.getElementById('question-text');

      [b1, b2, b3].forEach(b => {
        b.className = 'box';
        b.style.color = 'var(--text-color)';
      });

      if (currentMode === 'after') {
        qText.innerText = langData[currentLang].qAfter;
        b1.innerText = formatNumber(currentNumber);
        b2.innerText = formatNumber(currentNumber + 1);
        b3.innerText = "?";
        b3.classList.add('drop-zone');
        correctAnswer = currentNumber + 2;
      } 
      else if (currentMode === 'before') {
        qText.innerText = langData[currentLang].qBefore;
        b1.innerText = "?";
        b1.classList.add('drop-zone');
        b2.innerText = formatNumber(currentNumber);
        b3.innerText = formatNumber(currentNumber + 1);
        correctAnswer = currentNumber - 1;
      } 
      else if (currentMode === 'middle') {
        qText.innerText = langData[currentLang].qMiddle;
        b1.innerText = formatNumber(currentNumber);
        b2.innerText = "?";
        b2.classList.add('drop-zone');
        b3.innerText = formatNumber(currentNumber + 2);
        correctAnswer = currentNumber + 1;
      }

      setupDropZone();
      generateOptions();
      setTimeout(speakQuestionAudio, 300);
    }

    function generateOptions() {
      const optionsBox = document.getElementById('options-box');
      optionsBox.innerHTML = '';

      let options = [correctAnswer];
      while (options.length < 4) {
        let offset = (Math.floor(Math.random() * 7) - 3);
        let wrong = correctAnswer + (offset === 0 ? 1 : offset);
        if (wrong > 0 && !options.includes(wrong)) options.push(wrong);
      }

      options.sort(() => Math.random() - 0.5);

      options.forEach(num => {
        let card = document.createElement('div');
        card.className = 'option-card';
        card.innerText = formatNumber(num);
        card.setAttribute('data-value', num);
        card.draggable = true;

        card.onclick = function() { selectOption(num); };
        card.ondragstart = function(e) { e.dataTransfer.setData("text", num); };
        card.ontouchstart = function(e) { selectOption(num); };

        optionsBox.appendChild(card);
      });
    }

    function setupDropZone() {
      const dropZone = document.querySelector('.box.drop-zone');
      dropZone.ondragover = function(e) { e.preventDefault(); };
      dropZone.ondrop = function(e) {
        e.preventDefault();
        let num = e.dataTransfer.getData("text");
        if (num) selectOption(parseInt(num));
      };
    }

    function selectOption(num) {
      selectedAnswer = num;
      const dropZone = document.querySelector('.box.drop-zone');
      dropZone.innerText = formatNumber(num);
      dropZone.style.color = "var(--accent-color)";

      document.querySelectorAll('.option-card').forEach(card => {
        if (parseInt(card.getAttribute('data-value')) === num) {
          card.classList.add('selected');
        } else {
          card.classList.remove('selected');
        }
      });
    }

    function checkAnswer() {
      const feedback = document.getElementById('feedback');

      if (selectedAnswer === null) {
        feedback.className = 'feedback-message wrong';
        feedback.innerText = langData[currentLang].selectMsg;
        speakText(langData[currentLang].selectMsg);
        return;
      }

      if (selectedAnswer === correctAnswer) {
        feedback.className = 'feedback-message correct';
        feedback.innerText = langData[currentLang].correctMsg;
        
        playAudioTone('correct');
        speakText(langData[currentLang].correctMsg);

        score += 1;
        streak += 1;

        if (typeof confetti === 'function') {
          confetti({ particleCount: streak >= 3 ? 100 : 50, spread: 70, origin: { y: 0.7 } });
        }

        updateDisplay();

        setTimeout(() => { generateQuestion(); }, 1500);

      } else {
        streak = 0;
        wrongAttempts += 1;
        updateDisplay();
        playAudioTone('wrong');

        if (wrongAttempts >= 2) {
          feedback.className = 'feedback-message wrong';
          const revealMsg = langData[currentLang].revealMsg + formatNumber(correctAnswer);
          feedback.innerText = revealMsg;
          speakText(revealMsg);

          const dropZone = document.querySelector('.box.drop-zone');
          dropZone.innerText = formatNumber(correctAnswer);
          dropZone.classList.add('correct-highlight');

          document.getElementById('check-btn').style.display = 'none';
          document.getElementById('next-btn').style.display = 'inline-block';
        } else {
          feedback.className = 'feedback-message wrong';
          feedback.innerText = langData[currentLang].wrongMsg;
          speakText(langData[currentLang].wrongMsg);
        }
      }
    }

    function updateDisplay() {
      document.getElementById('score-text').innerText = langData[currentLang].scoreText + formatNumber(score);
      document.getElementById('streak-text').innerText = "⭐ " + formatNumber(streak);
    }

    window.onload = function() {
      switchLanguage('marathi');
      setMode('after');
    };
  </script>
</body>
</html>

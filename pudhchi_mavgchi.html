<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>पुढची - मागची संख्या खेळ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0b192c;
      color: #ffffff;
      text-align: center;
      padding: 15px;
      user-select: none;
    }
    .lang-btn-container {
      margin-bottom: 15px;
    }
    .btn-lang {
      padding: 8px 16px;
      margin: 0 5px;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      background-color: #1e3e62;
      color: white;
    }
    .btn-lang.active {
      background-color: #00d2ff;
      color: #000;
    }
    .score-board {
      background-color: #ff6500;
      display: inline-block;
      padding: 5px 20px;
      border-radius: 15px;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 15px;
    }
    .mode-buttons {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 15px 0;
      flex-wrap: wrap;
    }
    .btn-mode {
      padding: 10px 12px;
      border: 1px solid #00d2ff;
      border-radius: 8px;
      background-color: transparent;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-mode.active {
      background-color: #00d2ff;
      color: #000;
      font-weight: bold;
    }
    .question-title {
      font-size: 18px;
      margin: 15px 0;
    }

    /* ३ बॉक्सची रचना */
    .boxes-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 25px 0;
    }
    .box {
      width: 85px;
      height: 85px;
      border: 3px solid #00d2ff;
      border-radius: 15px;
      background-color: #1e3e62;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
    }
    /* रिकामा बॉक्स (Drop Zone) */
    .box.drop-zone {
      border: 3px dashed #ff8800;
      background-color: rgba(255, 255, 255, 0.05);
      color: #ff8800;
    }

    /* पर्याय (Options Area) */
    .options-title {
      font-size: 16px;
      margin-top: 20px;
      color: #00d2ff;
    }
    .options-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 15px 0;
      flex-wrap: wrap;
    }
    .option-card {
      width: 65px;
      height: 65px;
      background-color: #0084ff;
      color: white;
      font-size: 26px;
      font-weight: bold;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    .option-card:active {
      cursor: grabbing;
      transform: scale(1.1);
    }

    .btn-check {
      background-color: #00e676;
      color: #000;
      font-weight: bold;
      border: none;
      padding: 12px 30px;
      font-size: 18px;
      border-radius: 25px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- भाषा निवड बटणे -->
  <div class="lang-btn-container">
    <button class="btn-lang" id="btn-marathi" onclick="switchLanguage('marathi')">मराठी</button>
    <button class="btn-lang" id="btn-english" onclick="switchLanguage('english')">English</button>
  </div>

  <!-- स्कोअर बोर्ड -->
  <div class="score-board" id="score-text">गुण: ०</div>

  <!-- ३ मोड्स (Before, After, Middle) -->
  <div class="mode-buttons">
    <button class="btn-mode" id="mode-before" onclick="setMode('before')">Before Number</button>
    <button class="btn-mode" id="mode-after" onclick="setMode('after')">After Number</button>
    <button class="btn-mode" id="mode-middle" onclick="setMode('middle')">Middle Number</button>
  </div>

  <!-- प्रश्न शीर्षक -->
  <div class="question-title" id="question-text">पुढील संख्या सांगा:</div>

  <!-- ३ मुख्य बॉक्स -->
  <div class="boxes-container">
    <div class="box" id="box1"></div>
    <div class="box" id="box2"></div>
    <div class="box" id="box3"></div>
  </div>

  <!-- पर्यायांचे क्षेत्र -->
  <div class="options-title" id="options-label">योग्य पर्याय निवडा किंवा ड्रॅग करा:</div>
  <div class="options-container" id="options-box">
    <!-- पर्यायांची बटणे ऑटोमॅटिक इथे जोडली जातील -->
  </div>

  <button class="btn-check" id="check-btn" onclick="checkAnswer()">उत्तर तपासा</button>

  <script>
    const langData = {
      marathi: {
        scoreText: "गुण: ",
        btnBefore: "पूर्वीची संख्या (Before)",
        btnAfter: "पुढील संख्या (After)",
        btnMiddle: "मधील संख्या (Middle)",
        qBefore: "आधीची योग्य संख्या रिकाम्या बॉक्समध्ये टाका:",
        qAfter: "नंतरची योग्य संख्या रिकाम्या बॉक्समध्ये टाका:",
        qMiddle: "मधील योग्य संख्या रिकाम्या बॉक्समध्ये टाका:",
        optionsLabel: "योग्य अंक निवडा किंवा उचलून बॉक्समध्ये टाका:",
        checkBtn: "उत्तर तपासा",
        correctMsg: "शाब्बास! बरोबर उत्तर! 🎉",
        wrongMsg: "चुकले! पुन्हा प्रयत्न करा. ❌",
        selectMsg: "कृपया आधी एक संख्या निवडा!"
      },
      english: {
        scoreText: "SCORE: ",
        btnBefore: "Before Number",
        btnAfter: "After Number",
        btnMiddle: "Middle Number",
        qBefore: "Place the correct BEFORE number in the empty box:",
        qAfter: "Place the correct AFTER number in the empty box:",
        qMiddle: "Place the correct MIDDLE number in the empty box:",
        optionsLabel: "Select or drag the correct number:",
        checkBtn: "Check Answer",
        correctMsg: "Great Job! Correct Answer! 🎉",
        wrongMsg: "Wrong Answer! Try again. ❌",
        selectMsg: "Please select a number first!"
      }
    };

    let currentLang = 'marathi';
    let currentMode = 'after';
    let currentNumber = 10;
    let correctAnswer = 11;
    let selectedAnswer = null;
    let score = 0;

    function switchLanguage(lang) {
      currentLang = lang;
      document.getElementById('btn-marathi').classList.toggle('active', lang === 'marathi');
      document.getElementById('btn-english').classList.toggle('active', lang === 'english');

      document.getElementById('mode-before').innerText = langData[lang].btnBefore;
      document.getElementById('mode-after').innerText = langData[lang].btnAfter;
      document.getElementById('mode-middle').innerText = langData[lang].btnMiddle;
      document.getElementById('options-label').innerText = langData[lang].optionsLabel;
      document.getElementById('check-btn').innerText = langData[lang].checkBtn;

      updateScoreDisplay();
      generateQuestion();
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('mode-before').classList.toggle('active', mode === 'before');
      document.getElementById('mode-after').classList.toggle('active', mode === 'after');
      document.getElementById('mode-middle').classList.toggle('active', mode === 'middle');

      generateQuestion();
    }

    function generateQuestion() {
      selectedAnswer = null;
      currentNumber = Math.floor(Math.random() * 40) + 10;
      
      const b1 = document.getElementById('box1');
      const b2 = document.getElementById('box2');
      const b3 = document.getElementById('box3');
      const qText = document.getElementById('question-text');

      // क्लास रिसेट करणे
      [b1, b2, b3].forEach(b => b.className = 'box');

      if (currentMode === 'after') {
        qText.innerText = langData[currentLang].qAfter;
        b1.innerText = currentNumber;
        b2.innerText = currentNumber + 1;
        b3.innerText = "?";
        b3.classList.add('drop-zone');
        correctAnswer = currentNumber + 2;
      } 
      else if (currentMode === 'before') {
        qText.innerText = langData[currentLang].qBefore;
        b1.innerText = "?";
        b1.classList.add('drop-zone');
        b2.innerText = currentNumber;
        b3.innerText = currentNumber + 1;
        correctAnswer = currentNumber - 1;
      } 
      else if (currentMode === 'middle') {
        qText.innerText = langData[currentLang].qMiddle;
        b1.innerText = currentNumber;
        b2.innerText = "?";
        b2.classList.add('drop-zone');
        b3.innerText = currentNumber + 2;
        correctAnswer = currentNumber + 1;
      }

      setupDropZone();
      generateOptions();
    }

    function generateOptions() {
      const optionsBox = document.getElementById('options-box');
      optionsBox.innerHTML = '';

      // १ बरोबर पर्याय आणि ३ चुकीचे पर्याय
      let options = [correctAnswer];
      while (options.length < 4) {
        let wrong = correctAnswer + (Math.floor(Math.random() * 7) - 3);
        if (wrong > 0 && !options.includes(wrong)) {
          options.push(wrong);
        }
      }

      // पर्याय रँडमली मिक्स करणे
      options.sort(() => Math.random() - 0.5);

      options.forEach(num => {
        let card = document.createElement('div');
        card.className = 'option-card';
        card.innerText = num;
        card.draggable = true;

        // क्लिक करून निवडणे (मोबाईलसाठी सोपे)
        card.onclick = function() {
          selectOption(num);
        };

        // ड्रॅग सुरू करणे
        card.ondragstart = function(e) {
          e.dataTransfer.setData("text", num);
        };

        optionsBox.appendChild(card);
      });
    }

    function setupDropZone() {
      const dropZone = document.querySelector('.box.drop-zone');
      
      dropZone.ondragover = function(e) {
        e.preventDefault();
      };

      dropZone.ondrop = function(e) {
        e.preventDefault();
        let num = e.dataTransfer.getData("text");
        selectOption(parseInt(num));
      };
    }

    function selectOption(num) {
      selectedAnswer = num;
      const dropZone = document.querySelector('.box.drop-zone');
      dropZone.innerText = num;
      dropZone.style.color = "#00d2ff";
    }

    function checkAnswer() {
      if (selectedAnswer === null) {
        alert(langData[currentLang].selectMsg);
        return;
      }

      if (selectedAnswer === correctAnswer) {
        alert(langData[currentLang].correctMsg);
        score += 1;
        updateScoreDisplay();
        generateQuestion();
      } else {
        alert(langData[currentLang].wrongMsg);
      }
    }

    function updateScoreDisplay() {
      document.getElementById('score-text').innerText = langData[currentLang].scoreText + score;
    }

    window.onload = function() {
      switchLanguage('marathi');
      setMode('after');
    };
  </script>
</body>
</html>

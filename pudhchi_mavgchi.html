<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Game</title>
    <style>
        /* --- मुख्य डिझाईन आणि पार्श्वभूमी (Styling) --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #0d2347; /* तुमच्या स्क्रीनशॉट सारखा गडद निळा रंग */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- भाषा निवडक बटण विभाग --- */
        .lang-container {
            margin-top: 20px;
            background-color: #09172e;
            padding: 5px;
            border-radius: 25px;
            display: flex;
            border: 1px solid #1e3d6b;
        }

        .lang-btn {
            background: transparent;
            color: #a0aec0;
            border: none;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        /* ॲक्टिव्ह (सिलेक्टेड) भाषेचे बटण */
        .lang-btn.active {
            background-color: #00bcd4; /* मराठीसाठी निळा किंवा हायलाईट रंग */
            color: black;
            box-shadow: 0 0 10px #00bcd4;
        }

        /* --- मुख्य स्क्रीन कंटेनर --- */
        .game-screen {
            width: 90%;
            max-width: 400px;
            margin-top: 30px;
            padding: 20px;
            background-color: #091936;
            border-radius: 20px;
            border: 1px solid #16325c;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        /* --- भाषेनुसार स्क्रीन दाखवणे/लपवणे --- */
        #screen-english {
            display: none; /* सुरुवातीला इंग्रजी स्क्रीन पूर्णपणे लपलेली राहील */
        }

        /* --- इतर डिझाईन घटक (बटण व इतर) --- */
        .score-box {
            background-color: #ff5722;
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            display: inline-block;
            font-weight: bold;
            margin-top: 10px;
        }

        .select-box {
            width: 100%;
            padding: 10px;
            background-color: #050f24;
            color: white;
            border: 2px solid #00bcd4;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 16px;
        }

        .question-card {
            background-color: #0e2954;
            border: 2px solid #00bcd4;
            border-radius: 20px;
            padding: 40px;
            margin: 20px auto;
            font-size: 48px;
            font-weight: bold;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,198,255,0.4);
        }
    </style>
</head>
<body>

    <!-- १. भाषा निवडण्याचा विभाग (दोन्ही स्क्रीनवर एकच सामायिक राहील) -->
    <div class="lang-container">
        <button id="btn-marathi" class="lang-btn active" onclick="toggleLanguage('marathi')">मराठी</button>
        <button id="btn-english" class="lang-btn" onclick="toggleLanguage('english')">English</button>
    </div>

    <!-- २. मराठी भाषेची स्क्रीन -->
    <div id="screen-marathi" class="game-screen">
        <div class="score-box">SCORE: ०</div>
        
        <p>🎯 संख्या गट निवडा:</p>
        <select class="select-box">
            <option>🔢 गट: १ ते १०</option>
            <option>🔢 गट: ११ ते २०</option>
        </select>

        <h3>🤔 या संख्येच्या नंतरची (पुढची) संख्या सांगा:</h3>
        
        <div class="question-card">?</div>
        
        <button class="action-btn">उत्तर तपासा</button>
    </div>

    <!-- ३. इंग्रजी भाषेची स्क्रीन -->
    <div id="screen-english" class="game-screen">
        <div class="score-box">SCORE: 0</div>
        
        <p>🎯 Select Number Group:</p>
        <select class="select-box">
            <option>🔢 Group: 1 to 10</option>
            <option>🔢 Group: 11 to 20</option>
        </select>

        <h3>🤔 Tell the next (following) number:</h3>
        
        <div class="question-card">?</div>
        
        <button class="action-btn">Check Answer</button>
    </div>

    <!-- ४. JavaScript लॉजिक (स्क्रीन अदलाबदल करणे) -->
    <script>
        function toggleLanguage(selectedLang) {
            // दोन्ही स्क्रीनचे एलिमेंट्स मिळवणे
            const marathiScreen = document.getElementById('screen-marathi');
            const englishScreen = document.getElementById('screen-english');
            
            // भाषेच्या बटन्सचे एलिमेंट्स मिळवणे
            const marathiBtn = document.getElementById('btn-marathi');
            const englishBtn = document.getElementById('btn-english');

            if (selectedLang === 'marathi') {
                // मराठी स्क्रीन दाखवा आणि इंग्रजी पूर्णपणे लपवा
                marathiScreen.style.display = 'block';
                englishScreen.style.display = 'none';
                
                // बटण हायलाईट बदलणे
                marathiBtn.classList.add('active');
                englishBtn.classList.remove('active');
            } else if (selectedLang === 'english') {
                // इंग्रजी स्क्रीन दाखवा आणि मराठी पूर्णपणे लपवा
                marathiScreen.style.display = 'none';
                englishScreen.style.display = 'block';
                
                // बटण हायलाईट बदलणे
                englishBtn.classList.add('active');
                marathiBtn.classList.remove('active');
            }
        }
    </script>

</body>
</html>

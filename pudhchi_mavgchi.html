<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>संख्या खेळ - हॅम्बर्गर मेनू</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --bg-color: #0b192c;
      --card-bg: #1e3e62;
      --accent-color: #00d2ff;
      --text-color: #ffffff;
      --btn-color: #0084ff;
    }

    body.theme-jungle {
      --bg-color: #1b4332;
      --card-bg: #2d6a4f;
      --accent-color: #52b788;
      --text-color: #d8f3dc;
      --btn-color: #40916c;
    }

    body.theme-candy {
      --bg-color: #4a154b;
      --card-bg: #6b1d5c;
      --accent-color: #ff70a6;
      --text-color: #ffeafa;
      --btn-color: #ff9770;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      text-align: center;
      padding: 10px;
      margin: 0;
      user-select: none;
      touch-action: manipulation;
    }

    /* ☰ टॉप बार - स्वच्छ लेआउट */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 500px;
      margin: 5px auto 15px auto;
      padding: 0 10px;
    }

    /* तीन लाईन्सचे बटण (Hamburger Icon) */
    .menu-toggle-btn {
      background: var(--card-bg);
      border: 2px solid var(--accent-color);
      color: var(--text-color);
      font-size: 24px;
      padding: 6px 14px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stats-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .info-badge {
      background-color: #ff6500;
      color: #fff;
      padding: 6px 12px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 14px;
    }

    .streak-badge {
      background-color: #ffd700;
      color: #000;
      padding: 6px 12px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 14px;
    }

    /* ☰ स्लाईड-आऊट ड्रॉवर मेनू (Side Drawer) */
    .drawer-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      transition: opacity 0.3s;
    }

    .side-drawer {
      position: fixed;
      top: 0; left: -320px;
      width: 280px; height: 100%;
      background: var(--card-bg);
      border-right: 2px solid var(--accent-color);
      box-shadow: 5px 0 15px rgba(0,0,0,0.5);
      z-index: 1001;
      transition: left 0.3s ease;
      padding: 20px 15px;
      box-sizing: border-box;
      text-align: left;
      overflow-y: auto;
    }

    .side-drawer.open { left: 0; }
    .drawer-overlay.open { display: block; }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 10px;
      margin-bottom: 15px;
    }

    .drawer-header h3 { margin: 0; color: #ffd700; font-size: 20px; }
    .close-drawer-btn {
      background: none; border: none; color: #ff5252;
      font-size: 24px; cursor: pointer; font-weight: bold;
    }

    .menu-section { margin-bottom: 18px; }
    .menu-section label {
      display: block; font-size: 14px; font-weight: bold;
      margin-bottom: 6px; color: var(--accent-color);
    }

    .drawer-select, .drawer-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--accent-color);
      background-color: var(--bg-color);
      color: var(--text-color);
      font-size: 14px; font-weight: bold;
      cursor: pointer;
      box-sizing: border-box;
      margin-bottom: 8px;
    }

    .lang-btn-group { display: flex; gap: 8px; }
    .btn-lang {
      flex: 1; padding: 8px; border-radius: 8px;
      border: 1px solid var(--accent-color);
      background: var(--bg-color); color: var(--text-color);
      cursor: pointer; font-weight: bold;
    }
    .btn-lang.active { background: var(--accent-color); color: #000; }

    /* गेम एरिया स्टाइल */
    .question-area { max-width: 500px; margin: 0 auto; }
    .mascot { font-size: 50px; margin-bottom: -5px; display: inline-block; }
    .marathi-title { font-size: 22px; font-weight: bold; color: #4ade80; margin: 5px 0 2px 0; }
    .question-title { font-size: 15px; margin: 0 0 10px 0; opacity: 0.8; }

    .boxes-container { display: flex; justify-content: center; gap: 12px; margin: 15px 0; }
    .box {
      width: 85px; height: 85px;
      border: 3.5px solid var(--accent-color);
      border-radius: 18px;
      background-color: var(--card-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; font-weight: 800;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .box.drop-zone { border: 3.5px dashed #ff8800; color: #ff8800; }

    .options-container { display: flex; justify-content: center; gap: 12px; margin: 15px 0; flex-wrap: wrap; }
    .option-card {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, var(--btn-color), #1d4ed8);
      color: white; font-size: 32px; font-weight: 800;
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 5px 12px rgba(0,0,0,0.4);
    }
    .option-card.selected { background: #ff8800; }

    .action-btn-group { display: flex; justify-content: center; gap: 12px; margin-top: 15px; }
    .btn-check, .btn-replay {
      padding: 12px 25px; font-size: 16px; font-weight: bold;
      border-radius: 30px; border: none; cursor: pointer;
    }
    .btn-check { background-color: #00e676; color: #000; }
    .btn-replay { background-color: #00bcd4; color: #fff; }
    .feedback-message { font-size: 18px; font-weight: bold; min-height: 28px; margin: 8px 0; }
  </style>
</head>
<body id="game-body">

  <!-- ☰ टॉप बार -->
  <div class="top-bar">
    <button class="menu-toggle-btn" onclick="toggleDrawer()">☰</button>
    <div class="stats-group">
      <div class="info-badge" id="q-counter">प्रश्न: १/१०</div>
      <div class="streak-badge" id="streak-text">⭐ ०</div>
      <div class="info-badge" id="score-text">गुण: ०</div>
    </div>
  </div>

  <!-- ☰ तीन लाईन्स स्लाईड-आऊट मेनू (Side Drawer) -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="toggleDrawer()"></div>
  <div class="side-drawer" id="side-drawer">
    <div class="drawer-header">
      <h3>⚙️ मेनू आणि सेटिंग्ज</h3>
      <button class="close-drawer-btn" onclick="toggleDrawer()">✖</button>
    </div>

    <!-- १. खेळाचा प्रकार -->
    <div class="menu-section">
      <label>🎯 खेळाचा प्रकार:</label>
      <select class="drawer-select" id="mode-select" onchange="setMode(this.value)">
        <option value="after">पुढील संख्या</option>
        <option value="before">पूर्वीची संख्या</option>
        <option value="middle">मधील संख्या</option>
        <option value="mixed">🎲 मिश्रित प्रश्न</option>
      </select>
    </div>

    <!-- २. काठिण्य पातळी -->
    <div class="menu-section">
      <label>📊 काठिण्य पातळी:</label>
      <select class="drawer-select" id="level-select" onchange="changeLevel(this.value)">
        <option value="easy">सोपे (१-२०)</option>
        <option value="medium">मध्यम (१-१००)</option>
        <option value="hard">कठीण (१००-१०००)</option>
      </select>
    </div>

    <!-- ३. भाषा निवड -->
    <div class="menu-section">
      <label>🌐 भाषा (Language):</label>
      <div class="lang-btn-group">
        <button class="btn-lang active" id="btn-marathi" onclick="switchLanguage('marathi')">मराठी</button>
        <button class="btn-lang" id="btn-english" onclick="switchLanguage('english')">English</button>
      </div>
    </div>

    <!-- ४. थीम निवड -->
    <div class="menu-section">
      <label>🎨 थीम (Theme):</label>
      <select class="drawer-select" onchange="changeTheme(this.value)">
        <option value="space">🌌 Space</option>
        <option value="jungle">🌿 Jungle</option>
        <option value="candy">🍬 Candy</option>
      </select>
    </div>

    <!-- ५. ऑडिओ आणि स्क्रीन टॉगल -->
    <div class="menu-section">
      <button class="drawer-btn" id="btn-mute" onclick="toggleMute()">🔊 Voice: ON</button>
      <button class="drawer-btn" onclick="toggleFullScreen()">⛶ Fullscreen</button>
    </div>
  </div>

  <!-- मुख्य गेम एरिया -->
  <div class="question-area">
    <div class="mascot" id="mascot">🐰</div>
    <div class="marathi-title" id="marathi-title-text">नंतर येणारी संख्या ओळखा</div>
    <div class="question-title" id="question-text">Place the correct AFTER number:</div>
  </div>

  <div class="boxes-container">
    <div class="box" id="box1"></div>
    <div class="box" id="box2"></div>
    <div class="box" id="box3"></div>
  </div>

  <div class="feedback-message" id="feedback"></div>

  <div style="font-size: 14px; color: #00d2ff;" id="options-label">योग्य अंक निवडा, ड्रॅग करा किंवा १-४ की दाबा:</div>
  <div class="options-container" id="options-box"></div>

  <div class="action-btn-group">
    <button class="btn-replay" onclick="speakQuestionAudio()">🔄 पुन्हा ऐका</button>
    <button class="btn-check" id="check-btn" onclick="checkAnswer()">उत्तर तपासा</button>
      </div>
      <script>
    let currentLang = 'marathi';
    let currentMode = 'after';
    let activeSubMode = 'after';
    let currentLevel = 'easy';
    let currentNumber = 10;
    let correctAnswer = 11;
    let selectedAnswer = null;
    let score = 0;
    let streak = 0;
    let questionCount = 1;
    const maxQuestions = 10;
    let isAudioOn = true;

    /* ☰ ड्रॉवर मेनू उघडणे / बंद करणे */
    function toggleDrawer() {
      document.getElementById('side-drawer').classList.toggle('open');
      document.getElementById('drawer-overlay').classList.toggle('open');
    }

    function formatNumber(num) {
      if (num === "?" || num === null) return "?";
      return currentLang === 'marathi' ? num.toLocaleString('mr-IN') : num.toString();
    }

    function speakText(text) {
      if (isAudioOn && 'speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = currentLang === 'marathi' ? 'mr-IN' : 'en-US';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
      }
    }

    function toggleMute() {
      isAudioOn = !isAudioOn;
      document.getElementById('btn-mute').innerText = isAudioOn ? "🔊 Voice: ON" : "🔇 Voice: OFF";
    }

    function toggleFullScreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
      else if (document.exitFullscreen) document.exitFullscreen();
    }

    function changeTheme(theme) {
      const body = document.getElementById('game-body');
      body.className = '';
      if (theme !== 'space') body.classList.add('theme-' + theme);
    }

    function setMode(mode) {
      currentMode = mode;
      toggleDrawer();
      restartQuiz();
    }

    function changeLevel(level) {
      currentLevel = level;
      toggleDrawer();
      restartQuiz();
    }

    function switchLanguage(lang) {
      currentLang = lang;
      document.getElementById('btn-marathi').classList.toggle('active', lang === 'marathi');
      document.getElementById('btn-english').classList.toggle('active', lang === 'english');
      generateQuestion();
    }

    function getRandomNumber() {
      if (currentLevel === 'easy') return Math.floor(Math.random() * 18) + 2;
      if (currentLevel === 'medium') return Math.floor(Math.random() * 95) + 3;
      return Math.floor(Math.random() * 890) + 105;
    }

    function generateQuestion() {
      selectedAnswer = null;
      document.getElementById('feedback').innerText = '';

      if (currentMode === 'mixed') {
        const modes = ['before', 'after', 'middle'];
        activeSubMode = modes[Math.floor(Math.random() * modes.length)];
      } else {
        activeSubMode = currentMode;
      }

      currentNumber = getRandomNumber();
      const b1 = document.getElementById('box1');
      const b2 = document.getElementById('box2');
      const b3 = document.getElementById('box3');

      [b1, b2, b3].forEach(b => b.className = 'box');

      if (activeSubMode === 'after') {
        document.getElementById('marathi-title-text').innerText = "नंतर येणारी संख्या ओळखा";
        document.getElementById('question-text').innerText = "Place the correct AFTER number:";
        b1.innerText = formatNumber(currentNumber - 1);
        b2.innerText = formatNumber(currentNumber);
        b3.innerText = "?"; b3.classList.add('drop-zone');
        correctAnswer = currentNumber + 1;
      } else if (activeSubMode === 'before') {
        document.getElementById('marathi-title-text').innerText = "आधी येणारी संख्या ओळखा";
        document.getElementById('question-text').innerText = "Place the correct BEFORE number:";
        b1.innerText = "?"; b1.classList.add('drop-zone');
        b2.innerText = formatNumber(currentNumber);
        b3.innerText = formatNumber(currentNumber + 1);
        correctAnswer = currentNumber - 1;
      } else {
        document.getElementById('marathi-title-text').innerText = "मधील संख्या ओळखा";
        document.getElementById('question-text').innerText = "Place the correct MIDDLE number:";
        b1.innerText = formatNumber(currentNumber - 1);
        b2.innerText = "?"; b2.classList.add('drop-zone');
        b3.innerText = formatNumber(currentNumber + 1);
        correctAnswer = currentNumber;
      }

      generateOptions();
      updateDisplay();
    }

    function generateOptions() {
      const optionsBox = document.getElementById('options-box');
      optionsBox.innerHTML = '';
      let options = [correctAnswer];
      while (options.length < 4) {
        let wrong = correctAnswer + (Math.floor(Math.random() * 7) - 3);
        if (wrong > 0 && !options.includes(wrong)) options.push(wrong);
      }
      options.sort(() => Math.random() - 0.5);

      options.forEach(num => {
        let card = document.createElement('div');
        card.className = 'option-card';
        card.innerText = formatNumber(num);
        card.onclick = function() {
          selectedAnswer = num;
          document.querySelector('.box.drop-zone').innerText = formatNumber(num);
          document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
        };
        optionsBox.appendChild(card);
      });
    }

    function checkAnswer() {
      if (selectedAnswer === null) return;
      const feedback = document.getElementById('feedback');

      if (selectedAnswer === correctAnswer) {
        feedback.style.color = '#00ff66';
        feedback.innerText = "शाब्बास! बरोबर उत्तर! 🎉";
        score++; streak++;
        if (typeof confetti === 'function') confetti({ particleCount: 50, spread: 60 });
        speakText("बरोबर!");
        setTimeout(() => { questionCount++; generateQuestion(); }, 1000);
      } else {
        feedback.style.color = '#ff3333';
        feedback.innerText = "चुकले! पुन्हा प्रयत्न करा.";
        streak = 0;
        speakText("पुन्हा प्रयत्न करा");
      }
      updateDisplay();
    }

    function speakQuestionAudio() {
      let text = activeSubMode === 'after' ? `${currentNumber} नंतर काय येते?` : `${currentNumber} च्या आधी काय येते?`;
      speakText(text);
    }

    function restartQuiz() {
      score = 0; streak = 0; questionCount = 1;
      generateQuestion();
    }

    function updateDisplay() {
      document.getElementById('score-text').innerText = "गुण: " + formatNumber(score);
      document.getElementById('q-counter').innerText = "प्रश्न: " + formatNumber(questionCount) + "/" + formatNumber(maxQuestions);
      document.getElementById('streak-text').innerText = "⭐ " + formatNumber(streak);
    }

    window.onload = generateQuestion;
  </script>
</body>
</html>

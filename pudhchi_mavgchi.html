<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>पुढची - मागची संख्या खेळ</title>
  <!-- Confetti library फटाके अ‍ॅनिमेशनसाठी -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --bg-color: #0b192c;
      --card-bg: #1e3e62;
      --accent-color: #00d2ff;
      --text-color: #ffffff;
      --btn-color: #0084ff;
    }

    body.theme-jungle {
      --bg-color: #1b4332;
      --card-bg: #2d6a4f;
      --accent-color: #52b788;
      --text-color: #d8f3dc;
      --btn-color: #40916c;
    }

    body.theme-candy {
      --bg-color: #4a154b;
      --card-bg: #6b1d5c;
      --accent-color: #ff70a6;
      --text-color: #ffeafa;
      --btn-color: #ff9770;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      text-align: center;
      padding: 10px;
      margin: 0;
      user-select: none;
      touch-action: manipulation;
      transition: background-color 0.4s;
    }

    /* स्वच्छ आणि सुटसुटीत टॉप बार */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 500px;
      margin: 5px auto 10px auto;
      padding: 0 5px;
    }

    .stats-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .btn-settings {
      background: var(--card-bg);
      border: 1px solid var(--accent-color);
      color: var(--text-color);
      font-size: 20px;
      padding: 6px 12px;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .btn-custom, .level-select, .theme-select {
      padding: 8px 12px;
      font-weight: bold;
      border: 1px solid var(--accent-color);
      border-radius: 12px;
      cursor: pointer;
      background-color: var(--card-bg);
      color: var(--text-color);
      font-size: 14px;
    }

    .btn-custom.active {
      background-color: var(--accent-color);
      color: #000;
    }

    .info-badge {
      background-color: #ff6500;
      color: #fff;
      padding: 6px 12px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 14px;
    }

    .streak-badge {
      background-color: #ffd700;
      color: #000;
      padding: 6px 12px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 14px;
    }

    .controls-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 8px 0 15px 0;
    }

    .question-area {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }

    .mascot {
      font-size: 50px;
      margin-bottom: -5px;
      animation: bounce 2s infinite ease-in-out;
      display: inline-block;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .marathi-title {
      font-size: 22px;
      font-weight: bold;
      color: #4ade80;
      margin: 5px 0 2px 0;
    }

    .question-title {
      font-size: 15px;
      margin: 0 0 10px 0;
      opacity: 0.8;
    }

    .boxes-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 15px 0;
    }

    /* मोठे आणि ठळक नंबर बॉक्स */
    .box {
      width: 85px;
      height: 85px;
      border: 3.5px solid var(--accent-color);
      border-radius: 18px;
      background-color: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px; /* ठळक आणि मोठे फॉन्ट */
      font-weight: 800;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: all 0.3s;
    }

    .box.drop-zone {
      border: 3.5px dashed #ff8800;
      background-color: rgba(255, 255, 255, 0.05);
      color: #ff8800;
    }

    .box.correct-highlight {
      border-color: #00ff66 !important;
      background-color: rgba(0, 255, 102, 0.2) !important;
      color: #00ff66 !important;
    }

    .options-title {
      font-size: 15px;
      margin-top: 10px;
      color: var(--accent-color);
      font-weight: bold;
    }

    .options-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 15px 0;
      flex-wrap: wrap;
      min-height: 75px;
    }

    /* मोठे आणि रिस्पॉन्सिव्ह उत्तर पर्याय */
    .option-card {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, var(--btn-color), #1d4ed8);
      color: white;
      font-size: 32px; /* मोठे फॉन्ट */
      font-weight: 800;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(0,0,0,0.4);
      transition: transform 0.15s, background-color 0.2s;
      touch-action: none;
    }

    .option-card:active, .option-card.selected {
      transform: scale(1.12);
      background: #ff8800;
    }

    .action-btn-group {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .btn-check, .btn-next, .btn-replay {
      padding: 12px 25px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .btn-check { background-color: #00e676; color: #000; }
    .btn-replay { background-color: #00bcd4; color: #fff; }
    .btn-next { background-color: #ff9100; color: #fff; display: none; }
    .btn-check:disabled { opacity: 0.5; cursor: not-allowed; }

    .feedback-message {
      font-size: 18px;
      font-weight: bold;
      min-height: 28px;
      margin: 8px 0;
    }
    .feedback-message.correct { color: #00ff66; }
    .feedback-message.wrong { color: #ff3333; }

    .key-hint {
      font-size: 12px;
      color: #aaa;
      margin-top: 5px;
    }

    /* पॉप-अप मॉडल्स */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-card {
      background: var(--card-bg);
      border: 2px solid var(--accent-color);
      padding: 22px 25px;
      border-radius: 20px;
      max-width: 350px;
      width: 85%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .modal-card h2 { margin-top: 0; color: #ffd700; font-size: 22px; }
    .modal-card p { font-size: 16px; margin: 8px 0; }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
      gap: 10px;
    }

    .badge-display { font-size: 45px; margin: 10px 0; }

    .student-name-input {
      width: 85%;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--accent-color);
      margin-bottom: 12px;
      font-size: 15px;
      text-align: center;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }

    .btn-restart, .btn-close-settings {
      background: #00e676; border: none; padding: 12px;
      font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; color: #000;
    }

    .btn-close-settings { background: #ff5252; color: #fff; }

    .btn-whatsapp {
      background: #25d366; border: none; padding: 12px;
      font-size: 15px; font-weight: bold; border-radius: 25px; cursor: pointer; color: #fff;
    }
  </style>
</head>
<body id="game-body">

  <div class="top-bar">
    <button class="btn-settings" onclick="openSettingsModal()" title="सेटिंग्ज">⚙️</button>
    
    <div class="stats-group">
      <div class="info-badge" id="q-counter">प्रश्न: १/१०</div>
      <div class="streak-badge" id="streak-text">⭐ ०</div>
      <div class="info-badge" id="score-text">गुण: ०</div>
    </div>
  </div>

  <div class="controls-row">
    <select class="level-select" id="mode-select" onchange="setMode(this.value)">
      <option value="after">पुढील संख्या</option>
      <option value="before">पूर्वीची संख्या</option>
      <option value="middle">मधील संख्या</option>
      <option value="mixed">🎲 मिश्रित प्रश्न</option>
    </select>

    <select class="level-select" id="level-select" onchange="changeLevel(this.value)">
      <option value="easy">सोपे (१-२०)</option>
      <option value="medium">मध्यम (१-१००)</option>
      <option value="hard">कठीण (१००-१०००)</option>
    </select>
  </div>

  <div class="question-area">
    <div class="mascot" id="mascot">🐰</div>
    <!-- स्पष्ट मराठी शीर्षक -->
    <div class="marathi-title" id="marathi-title-text">नंतर येणारी संख्या ओळखा</div>
    <div class="question-title" id="question-text">Place the correct AFTER number:</div>
  </div>

  <div class="boxes-container">
    <div class="box" id="box1"></div>
    <div class="box" id="box2"></div>
    <div class="box" id="box3"></div>
  </div>

  <div class="feedback-message" id="feedback"></div>

  <div class="options-title" id="options-label">योग्य अंक निवडा, ड्रॅग करा किंवा १-४ की दाबा:</div>
  <div class="options-container" id="options-box"></div>
  <div class="key-hint" id="key-hint">💡 कॉम्प्युटर वापरत असल्यास १, २, ३, ४ दाबून उत्तर द्या</div>

  <div class="action-btn-group">
    <button class="btn-replay" onclick="speakQuestionAudio()">🔄 पुन्हा ऐका</button>
    <button class="btn-check" id="check-btn" onclick="checkAnswer()">उत्तर तपासा</button>
    <button class="btn-next" id="next-btn" onclick="nextQuestionFlow()">पुढील प्रश्न ➔</button>
  </div>

  <!-- ⚙️ सेटिंग्ज मॉडेल -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal-card">
      <h2 id="settings-title">⚙️ सेटिंग्ज (Settings)</h2>
      
      <div class="setting-item">
        <span>भाषा (Language):</span>
        <div>
          <button class="btn-custom active" id="btn-marathi" onclick="switchLanguage('marathi')">मराठी</button>
          <button class="btn-custom" id="btn-english" onclick="switchLanguage('english')">English</button>
        </div>
      </div>

      <div class="setting-item">
        <span>थीम (Theme):</span>
        <select class="theme-select" onchange="changeTheme(this.value)">
          <option value="space">🌌 Space</option>
          <option value="jungle">🌿 Jungle</option>
          <option value="candy">🍬 Candy</option>
        </select>
      </div>

      <div class="setting-item">
        <button class="btn-custom" id="btn-mute" onclick="toggleMute()">🔊 Voice: ON</button>
        <button class="btn-custom" id="btn-fullscreen" onclick="toggleFullScreen()">⛶ Fullscreen</button>
      </div>

      <div class="modal-actions" style="margin-top: 15px;">
        <button class="btn-close-settings" onclick="closeSettingsModal()">बंद करा ✖</button>
      </div>
    </div>
  </div>

  <!-- 🏆 रिझल्ट स्क्रीन (Result Popup Modal) -->
  <div class="modal-overlay" id="result-modal">
    <div class="modal-card">
      <h2 id="modal-title">🏆 अभिनंदन! 🏆</h2>
      <div class="badge-display" id="badge-icon">👑</div>
      <p id="badge-name" style="font-weight:bold; color:#ffd700;"></p>
      <p id="modal-score">तुमचे गुण: ८ / १०</p>
      <p id="modal-accuracy">अचूकता: ८०%</p>
      
      <input type="text" id="student-name" class="student-name-input" placeholder="विद्यार्थ्याचे नाव टाका" />

      <div class="modal-actions">
        <button class="btn-whatsapp" onclick="shareWhatsAppReport()">📱 WhatsApp वर रिपोर्ट पाठवा</button>
        <button class="btn-restart" onclick="restartQuiz()">पुन्हा खेळा 🔄</button>
      </div>
    </div>
  </div>
  <script>
    const langData = {
      marathi: {
        scoreText: "गुण: ",
        qCounter: "प्रश्न: ",
        optBefore: "पूर्वीची संख्या",
        optAfter: "पुढील संख्या",
        optMiddle: "मधील संख्या",
        optMixed: "🎲 मिश्रित प्रश्न",
        mrTitleBefore: "आधी येणारी संख्या ओळखा",
        mrTitleAfter: "नंतर येणारी संख्या ओळखा",
        mrTitleMiddle: "मधील संख्या ओळखा",
        qBefore: "Place the correct BEFORE number:",
        qAfter: "Place the correct AFTER number:",
        qMiddle: "Place the correct MIDDLE number:",
        optionsLabel: "योग्य अंक निवडा, ड्रॅग करा किंवा १-४ की दाबा:",
        checkBtn: "उत्तर तपासा",
        nextBtn: "पुढील प्रश्न ➔",
        correctMsg: "शाब्बास! बरोबर उत्तर!",
        wrongMsg: "चुकले! पुन्हा प्रयत्न करा.",
        revealMsg: "योग्य उत्तर हे आहे: ",
        selectMsg: "कृपया आधी एक संख्या निवडा!",
        modalTitle: "🏆 निकाल कार्ड 🏆",
        modalScore: "तुमचे गुण: ",
        modalAcc: "अचूकता: ",
        keyHint: "💡 कॉम्प्युटर वापरत असल्यास १, २, ३, ४ दाबून उत्तर द्या",
        speechLang: "mr-IN",
        levels: { easy: "सोपे (१-२०)", medium: "मध्यम (१-१००)", hard: "कठीण (१००-१०००)" }
      },
      english: {
        scoreText: "SCORE: ",
        qCounter: "Q: ",
        optBefore: "Before Number",
        optAfter: "After Number",
        optMiddle: "Middle Number",
        optMixed: "🎲 Mixed Mode",
        mrTitleBefore: "Identify Before Number",
        mrTitleAfter: "Identify After Number",
        mrTitleMiddle: "Identify Middle Number",
        qBefore: "Place the correct BEFORE number:",
        qAfter: "Place the correct AFTER number:",
        qMiddle: "Place the correct MIDDLE number:",
        optionsLabel: "Select, drag or press keys 1-4:",
        checkBtn: "Check Answer",
        nextBtn: "Next Question ➔",
        correctMsg: "Great Job! Correct Answer!",
        wrongMsg: "Wrong Answer! Try again.",
        revealMsg: "The correct answer is: ",
        selectMsg: "Please select a number first!",
        modalTitle: "🏆 Result Card 🏆",
        modalScore: "Your Score: ",
        modalAcc: "Accuracy: ",
        keyHint: "💡 On computer, press keys 1, 2, 3, 4 to select option",
        speechLang: "en-US",
        levels: { easy: "Easy (1-20)", medium: "Medium (1-100)", hard: "Hard (100-1000)" }
      }
    };

    let currentLang = 'marathi';
    let currentMode = 'after';
    let activeSubMode = 'after';
    let currentLevel = 'easy';
    let currentNumber = 10;
    let correctAnswer = 11;
    let selectedAnswer = null;
    let score = 0;
    let streak = 0;
    let wrongAttempts = 0;
    let questionCount = 1;
    const maxQuestions = 10;
    let isAudioOn = true;
    let currentOptionsList = [];

    const mascots = ['🐰', '🦊', '🦁', '🐸', '🐼', '🦄'];

    function openSettingsModal() {
      document.getElementById('settings-modal').style.display = 'flex';
    }

    function closeSettingsModal() {
      document.getElementById('settings-modal').style.display = 'none';
    }

    function formatNumber(num) {
      if (num === "?" || num === null) return "?";
      return currentLang === 'marathi' ? num.toLocaleString('mr-IN') : num.toString();
    }

    /* मराठी ऑडिओ व्हॉईस सपोर्ट */
    function speakText(text, onEndCallback = null) {
      if (isAudioOn && 'speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = langData[currentLang].speechLang;
        utterance.rate = 0.85; // थोडा मऊ आणि हळू आवाज
        if (onEndCallback) utterance.onend = onEndCallback;
        window.speechSynthesis.speak(utterance);
      }
    }

    function toggleMute() {
      isAudioOn = !isAudioOn;
      document.getElementById('btn-mute').innerText = isAudioOn ? "🔊 Voice: ON" : "🔇 Voice: OFF";
      if (!isAudioOn && 'speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    function toggleFullScreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(()=>{});
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
      }
    }

    function changeTheme(theme) {
      const body = document.getElementById('game-body');
      body.className = '';
      if (theme !== 'space') body.classList.add('theme-' + theme);
    }

    function speakQuestionAudio() {
      let qStr = "";
      if (currentLang === 'marathi') {
        if (activeSubMode === 'after') qStr = formatNumber(currentNumber) + " नंतर काय येते?";
        else if (activeSubMode === 'before') qStr = formatNumber(currentNumber) + " च्या आधी काय येते?";
        else if (activeSubMode === 'middle') qStr = formatNumber(currentNumber - 1) + " आणि " + formatNumber(currentNumber + 1) + " च्या मधील संख्या सांगा";
      } else {
        if (activeSubMode === 'after') qStr = "What comes after " + currentNumber + "?";
        else if (activeSubMode === 'before') qStr = "What comes before " + currentNumber + "?";
        else if (activeSubMode === 'middle') qStr = "What comes between " + (currentNumber - 1) + " and " + (currentNumber + 1) + "?";
      }
      speakText(qStr);
    }

    /* मऊ आणि आकर्षक ध्वनी प्रभाव */
    function playAudioTone(type) {
      if (!isAudioOn) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);

        if (type === 'correct') {
          osc.frequency.setValueAtTime(523.25, ctx.currentTime);
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.25, ctx.currentTime);
          osc.start(); osc.stop(ctx.currentTime + 0.25);
        } else {
          osc.frequency.setValueAtTime(220, ctx.currentTime);
          osc.frequency.setValueAtTime(180, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          osc.start(); osc.stop(ctx.currentTime + 0.25);
        }
      } catch (e) {}
    }

    function switchLanguage(lang) {
      currentLang = lang;
      document.getElementById('btn-marathi').classList.toggle('active', lang === 'marathi');
      document.getElementById('btn-english').classList.toggle('active', lang === 'english');

      const mSelect = document.getElementById('mode-select');
      mSelect.options[0].text = langData[lang].optAfter;
      mSelect.options[1].text = langData[lang].optBefore;
      mSelect.options[2].text = langData[lang].optMiddle;
      mSelect.options[3].text = langData[lang].optMixed;

      document.getElementById('options-label').innerText = langData[lang].optionsLabel;
      document.getElementById('check-btn').innerText = langData[lang].checkBtn;
      document.getElementById('next-btn').innerText = langData[lang].nextBtn;
      document.getElementById('key-hint').innerText = langData[lang].keyHint;

      const lvlSelect = document.getElementById('level-select');
      lvlSelect.options[0].text = langData[lang].levels.easy;
      lvlSelect.options[1].text = langData[lang].levels.medium;
      lvlSelect.options[2].text = langData[lang].levels.hard;

      updateDisplay();
      generateQuestion();
    }

    function changeLevel(level) {
      currentLevel = level;
      restartQuiz();
    }

    function setMode(mode) {
      currentMode = mode;
      restartQuiz();
    }

    function getRandomNumber() {
      if (currentLevel === 'easy') return Math.floor(Math.random() * 18) + 2;
      if (currentLevel === 'medium') return Math.floor(Math.random() * 95) + 3;
      return Math.floor(Math.random() * 890) + 105;
    }

    function generateQuestion() {
      selectedAnswer = null;
      wrongAttempts = 0;
      document.getElementById('feedback').innerText = '';
      
      const checkBtn = document.getElementById('check-btn');
      checkBtn.style.display = 'inline-block';
      checkBtn.disabled = true;
      document.getElementById('next-btn').style.display = 'none';

      document.getElementById('mascot').innerText = mascots[Math.floor(Math.random() * mascots.length)];

      if (currentMode === 'mixed') {
        const subModes = ['before', 'after', 'middle'];
        activeSubMode = subModes[Math.floor(Math.random() * subModes.length)];
      } else {
        activeSubMode = currentMode;
      }

      currentNumber = getRandomNumber();
      
      const b1 = document.getElementById('box1');
      const b2 = document.getElementById('box2');
      const b3 = document.getElementById('box3');
      const mrTitle = document.getElementById('marathi-title-text');
      const qText = document.getElementById('question-text');

      [b1, b2, b3].forEach(b => {
        b.className = 'box';
        b.style.color = 'var(--text-color)';
      });

      if (activeSubMode === 'after') {
        mrTitle.innerText = langData[currentLang].mrTitleAfter;
        qText.innerText = langData[currentLang].qAfter;
        b1.innerText = formatNumber(currentNumber - 1);
        b2.innerText = formatNumber(currentNumber);
        b3.innerText = "?";
        b3.classList.add('drop-zone');
        correctAnswer = currentNumber + 1;
      } 
      else if (activeSubMode === 'before') {
        mrTitle.innerText = langData[currentLang].mrTitleBefore;
        qText.innerText = langData[currentLang].qBefore;
        b1.innerText = "?";
        b1.classList.add('drop-zone');
        b2.innerText = formatNumber(currentNumber);
        b3.innerText = formatNumber(currentNumber + 1);
        correctAnswer = currentNumber - 1;
      } 
      else if (activeSubMode === 'middle') {
        mrTitle.innerText = langData[currentLang].mrTitleMiddle;
        qText.innerText = langData[currentLang].qMiddle;
        b1.innerText = formatNumber(currentNumber - 1);
        b2.innerText = "?";
        b2.classList.add('drop-zone');
        b3.innerText = formatNumber(currentNumber + 1);
        correctAnswer = currentNumber;
      }

      setupDropZone();
      generateOptions();
      updateDisplay();
      setTimeout(speakQuestionAudio, 300);
    }

    function generateOptions() {
      const optionsBox = document.getElementById('options-box');
      optionsBox.innerHTML = '';

      let options = [correctAnswer];
      while (options.length < 4) {
        let offset = (Math.floor(Math.random() * 7) - 3);
        let wrong = correctAnswer + (offset === 0 ? 1 : offset);
        if (wrong > 0 && !options.includes(wrong)) options.push(wrong);
      }

      options.sort(() => Math.random() - 0.5);
      currentOptionsList = options;

      options.forEach(num => {
        let card = document.createElement('div');
        card.className = 'option-card';
        card.innerText = formatNumber(num);
        card.setAttribute('data-value', num);
        card.draggable = true;

        card.onclick = function() { selectOption(num); };
        card.ondragstart = function(e) { e.dataTransfer.setData("text", num); };
        card.ontouchstart = function(e) { selectOption(num); };

        optionsBox.appendChild(card);
      });
    }

    function setupDropZone() {
      const dropZone = document.querySelector('.box.drop-zone');
      dropZone.ondragover = function(e) { e.preventDefault(); };
      dropZone.ondrop = function(e) {
        e.preventDefault();
        let num = e.dataTransfer.getData("text");
        if (num) selectOption(parseInt(num));
      };
    }

    function selectOption(num) {
      selectedAnswer = num;
      const dropZone = document.querySelector('.box.drop-zone');
      dropZone.innerText = formatNumber(num);
      dropZone.style.color = "var(--accent-color)";

      document.querySelectorAll('.option-card').forEach(card => {
        if (parseInt(card.getAttribute('data-value')) === num) {
          card.classList.add('selected');
        } else {
          card.classList.remove('selected');
        }
      });

      setTimeout(() => {
        document.getElementById('check-btn').disabled = false;
      }, 300);
    }

    window.addEventListener('keydown', function(e) {
      if (['1', '2', '3', '4'].includes(e.key)) {
        let index = parseInt(e.key) - 1;
        if (currentOptionsList[index] !== undefined) {
          selectOption(currentOptionsList[index]);
        }
      } else if (e.key === 'Enter') {
        const checkBtn = document.getElementById('check-btn');
        if (checkBtn.style.display !== 'none' && !checkBtn.disabled) {
          checkAnswer();
        } else {
          nextQuestionFlow();
        }
      }
    });

    function checkAnswer() {
      const feedback = document.getElementById('feedback');

      if (selectedAnswer === null) {
        feedback.className = 'feedback-message wrong';
        feedback.innerText = langData[currentLang].selectMsg;
        speakText(langData[currentLang].selectMsg);
        return;
      }

      if (selectedAnswer === correctAnswer) {
        feedback.className = 'feedback-message correct';
        feedback.innerText = langData[currentLang].correctMsg + " 🎉";
        
        playAudioTone('correct');
        score += 1;
        streak += 1;

        /* ५ किंवा ५ च्या पटीत Streak झाल्यास फटाके/Confetti उडणे */
        if (streak > 0 && streak % 5 === 0 && typeof confetti === 'function') {
          confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 } });
        } else if (typeof confetti === 'function') {
          confetti({ particleCount: 40, spread: 50, origin: { y: 0.7 } });
        }

        updateDisplay();

        speakText(langData[currentLang].correctMsg, function() {
          setTimeout(() => { nextQuestionFlow(); }, 300);
        });

      } else {
        streak = 0; // चुकीचे उत्तर दिल्यावर स्टार रिसेट
        wrongAttempts += 1;
        updateDisplay();
        playAudioTone('wrong');

        if (wrongAttempts >= 2) {
          feedback.className = 'feedback-message wrong';
          const revealMsg = langData[currentLang].revealMsg + formatNumber(correctAnswer);
          feedback.innerText = revealMsg;
          speakText(revealMsg);

          const dropZone = document.querySelector('.box.drop-zone');
          dropZone.innerText = formatNumber(correctAnswer);
          dropZone.classList.add('correct-highlight');

          document.getElementById('check-btn').style.display = 'none';
          document.getElementById('next-btn').style.display = 'inline-block';
        } else {
          feedback.className = 'feedback-message wrong';
          feedback.innerText = langData[currentLang].wrongMsg;
          speakText(langData[currentLang].wrongMsg);
        }
      }
    }

    function nextQuestionFlow() {
      if (questionCount >= maxQuestions) {
        showResults();
      } else {
        questionCount++;
        generateQuestion();
      }
    }

    /* १० प्रश्न पूर्ण झाल्यावर दाखवायची रिझल्ट स्क्रीन */
    function showResults() {
      const modal = document.getElementById('result-modal');
      document.getElementById('modal-title').innerText = langData[currentLang].modalTitle;
      document.getElementById('modal-score').innerText = langData[currentLang].modalScore + formatNumber(score) + " / " + formatNumber(maxQuestions);
      
      let accuracy = Math.round((score / maxQuestions) * 100);
      document.getElementById('modal-accuracy').innerText = langData[currentLang].modalAcc + formatNumber(accuracy) + "%";

      const badgeIcon = document.getElementById('badge-icon');
      const badgeName = document.getElementById('badge-name');
      
      if (score === 10) {
        badgeIcon.innerText = "👑";
        badgeName.innerText = currentLang === 'marathi' ? "गणित सम्राट (Math King)" : "Math Emperor";
      } else if (score >= 8) {
        badgeIcon.innerText = "⭐";
        badgeName.innerText = currentLang === 'marathi' ? "सुपर स्टार (Super Star)" : "Super Star";
      } else if (score >= 5) {
        badgeIcon.innerText = "🥇";
        badgeName.innerText = currentLang === 'marathi' ? "प्रविण खेळाडू (Smart Player)" : "Smart Player";
      } else {
        badgeIcon.innerText = "🎯";
        badgeName.innerText = currentLang === 'marathi' ? "प्रयत्नशील (Keep Trying)" : "Keep Trying";
      }

      modal.style.display = 'flex';
      if (typeof confetti === 'function') confetti({ particleCount: 180, spread: 100 });
      speakText(langData[currentLang].modalTitle);
    }

    function shareWhatsAppReport() {
      let studentName = document.getElementById('student-name').value.trim();
      let badge = document.getElementById('badge-name').innerText;
      let nameStr = studentName ? `👤 विद्यार्थी: *${studentName}*\n` : "";
      
      let text = `🎮 *गणित खेळ रिपोर्ट - संख्या ओळख* 🎮\n\n` +
                 nameStr +
                 `📊 गुण: ${score} / ${maxQuestions}\n` +
                 `🏆 मिळवलेला बॅज: ${badge}\n` +
                 `🎯 पातळी: ${currentLevel.toUpperCase()}\n\n` +
                 `खूप छान प्रगती! 👏`;
      let url = "https://api.whatsapp.com/send?text=" + encodeURIComponent(text);
      window.open(url, '_blank');
    }

    function restartQuiz() {
      score = 0;
      streak = 0;
      questionCount = 1;
      document.getElementById('student-name').value = '';
      document.getElementById('result-modal').style.display = 'none';
      generateQuestion();
    }

    function updateDisplay() {
      document.getElementById('score-text').innerText = langData[currentLang].scoreText + formatNumber(score);
      document.getElementById('q-counter').innerText = langData[currentLang].qCounter + formatNumber(questionCount) + "/" + formatNumber(maxQuestions);
      document.getElementById('streak-text').innerText = "⭐ " + formatNumber(streak);
    }

    window.onload = function() {
      switchLanguage('marathi');
      setMode('after');
    };
  </script>
</body>
</html>

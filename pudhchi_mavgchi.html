<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>संख्या ओळख गेम (Before, After, Between)</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --card-bg: rgba(255, 255, 255, 0.08);
            --neon-blue: #00f2fe;
            --neon-green: #00e676;
            --neon-red: #ff1744;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-content: center;
            min-height: 95vh;
            flex-direction: column;
        }

        .game-wrapper {
            background: rgba(15, 32, 67, 0.7);
            border: 2px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(0, 242, 254, 0.1);
            border-radius: 24px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* Top Bar: Language & Score */
        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .lang-switch-box {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .lang-switch-box label {
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 20px;
            font-weight: 600;
            transition: 0.3s;
            font-size: 14px;
        }

        .lang-switch-box input[type="radio"] {
            display: none;
        }

        .lang-switch-box input[type="radio"]:checked + label {
            background: var(--neon-blue);
            color: #0f2043;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .score-board {
            background: linear-gradient(90deg, #ff8c00, #e52d27);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(229, 45, 39, 0.4);
        }

        /* Range Selector Area */
        .range-box-area {
            margin-bottom: 25px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .range-box-area label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            color: #bdc3c7;
        }

        .styled-dropdown {
            background: #0f2043;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            width: 100%;
            max-width: 250px;
            text-align: center;
            font-weight: bold;
        }

        /* Instruction text */
        .instruction-box {
            font-size: 22px;
            font-weight: bold;
            margin: 20px 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* Numbers Display Grid */
        .number-display-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .num-box {
            width: 90px;
            height: 90px;
            background: var(--card-bg);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .num-box.missing {
            border: 3px dashed var(--neon-blue);
            background: rgba(0, 242, 254, 0.05);
            color: var(--neon-blue);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { border-color: rgba(0, 242, 254, 0.4); }
            50% { border-color: rgba(0, 242, 254, 1); box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }
            100% { border-color: rgba(0, 242, 254, 0.4); }
        }

        .num-box.missing.filled {
            border-style: solid;
            background: rgba(0, 242, 254, 0.15);
            animation: none;
        }

        /* Correct/Wrong Dynamic Glows */
        .num-box.success-state {
            border-color: var(--neon-green) !important;
            color: var(--neon-green) !important;
            background: rgba(0, 230, 118, 0.2) !important;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4) !important;
        }

        .num-box.error-state {
            border-color: var(--neon-red) !important;
            color: var(--neon-red) !important;
            background: rgba(255, 23, 68, 0.2) !important;
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.4) !important;
        }

        /* Options Container */
        .options-outer-container {
            margin: 25px 0;
        }

        .options-flex {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .opt-btn {
            background: #0f2043;
            border: 2px solid rgba(0, 242, 254, 0.5);
            color: white;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 80px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .opt-btn:hover:not(:disabled) {
            background: var(--neon-blue);
            color: #0f2043;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 242, 254, 0.4);
        }

        .opt-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .opt-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: rgba(255,255,255,0.1);
        }

        /* Action Controls */
        .action-control-area {
            margin-top: 30px;
        }

        .primary-action-btn {
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            border: none;
            color: #0f2043;
            padding: 14px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
            transition: all 0.3s ease;
        }

        .primary-action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.6);
        }

        /* Result Feedback Messages */
        .result {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            min-height: 30px;
            transition: all 0.3s ease;
        }

        .result.correct {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0,230,118,0.3);
        }

        .result.wrong {
            color: var(--neon-red);
            text-shadow: 0 0 10px rgba(255,23,68,0.3);
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <!-- Top Bar -->
    <div class="top-navbar">
        <div class="lang-switch-box">
            <input type="radio" id="lang-mr" name="lang-select" value="mr" checked onchange="updateLanguageUI()">
            <label for="lang-mr">मराठी</label>
            <input type="radio" id="lang-en" name="lang-select" value="en" onchange="updateLanguageUI()">
            <label for="lang-en">English</label>
        </div>
        <div class="score-board" id="score-board-count">SCORE: ०</div>
    </div>

    <!-- Range Selector Dropdown -->
    <div class="range-box-area">
        <label id="select-range-label" for="range-select-dropdown">🎯 अभ्यासासाठी संख्या गट निवडा:</label>
        <select id="range-select-dropdown" class="styled-dropdown" onchange="onRangeDropdownChange()">
            <option value="1-10">🔢 गट: १ ते १०</option>
            <option value="11-20">🔢 गट: ११ ते २०</option>
            <option value="21-30">🔢 गट: २१ ते ३०</option>
            <option value="31-40">🔢 गट: ३१ ते ४०</option>
            <option value="41-50">🔢 गट: ४१ ते ५०</option>
            <option value="51-60">🔢 गट: ५१ ते ६०</option>
            <option value="61-70">🔢 गट: ६१ ते ७०</option>
            <option value="71-80">🔢 गट: ७१ ते ८०</option>
            <option value="81-90">🔢 गट: ८१ ते ९०</option>
            <option value="91-100">🔢 गट: ९१ ते १००</option>
        </select>
    </div>

    <!-- Dynamic Instruction -->
    <div class="instruction-box" id="instruction-text">🤔 आधीची संख्या ओळखा!</div>

    <!-- Main Game Number Blocks -->
    <div class="number-display-grid">
        <div class="num-box" id="box-1">१</div>
        <div class="num-box" id="box-2">२</div>
        <div class="num-box" id="box-3">३</div>
    </div>

    <!-- Multiple Choice Options -->
    <div class="options-outer-container">
        <div class="options-flex" id="options-container">
            <!-- Buttons dynamically generated -->
        </div>
    </div>

    <!-- Feedback Message Display -->
    <div class="result" id="result-message"></div>

    <!-- Big Action Button Area -->
    <div class="action-control-area">
        <button class="primary-action-btn" id="action-btn" onclick="checkAnswer()">उत्तर तपासा</button>
    </div>
    </div>
    <script>
    let score = 0, correctAns = 0, selectedAns = null;
    let lastCorrectAns = 0;
    let isReviewState = false;
    let generatedOptions = [];
    
    let minRange = 1;
    let maxRange = 10;
    let gameType = "before"; 
    let n1=1, n2=2, n3=3;
    
    const marathiDigits = {'0':'०','1':'१','2':'२','3':'३','4':'४','5':'५','6':'६','7':'७','8':'८','9':'९'};

    // 🔊 बरोबर उत्तरासाठी आवाज (Success Audio Synth)
    function playCorrectSound() {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = ctx.createOscillator();
        let gain = ctx.createGain();
        osc.type = 'sine';
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        // पहिली गोड नोट (D5)
        osc.frequency.setValueAtTime(587.33, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.start();
        
        // दुसरी उच्च नोट (A5) गेमिंग फीलसाठी
        osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime + 0.1);
        
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.4);
        osc.stop(ctx.currentTime + 0.4);
    }

    // 🔊 चुकीच्या उत्तरासाठी बझर आवाज (Wrong Audio Synth)
    function playWrongSound() {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = ctx.createOscillator();
        let gain = ctx.createGain();
        osc.type = 'sawtooth'; // बझर इफेक्टसाठी सॉ-टूथ वेव्ह
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        osc.frequency.setValueAtTime(130.81, ctx.currentTime); // C3 लो-टोन बेस
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        osc.start();
        
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
        osc.stop(ctx.currentTime + 0.3);
    }

    function convertToMarathi(number) {
        if(number === "?") return "?";
        return number.toString().split('').map(digit => marathiDigits[digit] || digit).join('');
    }

    function currentLanguage() {
        let selected = document.querySelector('input[name="lang-select"]:checked');
        return selected ? selected.value : "mr";
    }

    function onRangeDropdownChange() {
        let dropdown = document.getElementById("range-select-dropdown");
        let val = dropdown.value;
        let parts = val.split("-");
        minRange = parseInt(parts[0]);
        maxRange = parseInt(parts[1]);
        
        score = 0;
        lastCorrectAns = 0;
        generateQuestion();
    }

    function updateLanguageUI() {
        let lang = currentLanguage();
        let btn = document.getElementById("action-btn");
        let dropdown = document.getElementById("range-select-dropdown");
        
        if(lang === 'mr') {
            document.getElementById("select-range-label").innerText = "🎯 अभ्यासासाठी संख्या गट निवडा:";
            document.getElementById("score-board-count").innerText = "SCORE: " + convertToMarathi(score);
            
            dropdown.options[0].text = "🔢 गट: १ ते १०";
            dropdown.options[1].text = "🔢 गट: ११ ते २०";
            dropdown.options[2].text = "🔢 गट: २१ ते ३०";
            dropdown.options[3].text = "🔢 गट: ३१ ते ४०";
            dropdown.options[4].text = "🔢 गट: ४१ ते ५०";
            dropdown.options[5].text = "🔢 गट: ५१ ते ६०";
            dropdown.options[6].text = "🔢 गट: ६१ ते ७०";
            dropdown.options[7].text = "🔢 गट: ७१ ते ८०";
            dropdown.options[8].text = "🔢 गट: ८१ ते ९०";
            dropdown.options[9].text = "🔢 गट: ९१ ते १००";
        } else {
            document.getElementById("select-range-label").innerText = "🎯 Select Number Group:";
            document.getElementById("score-board-count").innerText = "SCORE: " + score;
            
            dropdown.options[0].text = "🔢 Group: 1 to 10";
            dropdown.options[1].text = "🔢 Group: 11 to 20";
            dropdown.options[2].text = "🔢 Group: 21 to 30";
            dropdown.options[3].text = "🔢 Group: 31 to 40";
            dropdown.options[4].text = "🔢 Group: 41 to 50";
            dropdown.options[5].text = "🔢 Group: 51 to 60";
            dropdown.options[6].text = "🔢 Group: 61 to 70";
            dropdown.options[7].text = "🔢 Group: 71 to 80";
            dropdown.options[8].text = "🔢 Group: 81 to 90";
            dropdown.options[9].text = "🔢 Group: 91 to 100";
        }

        setInstructionText();
        
        let state = btn.getAttribute("data-state") || "check";
        if(state === "next") {
            btn.innerText = (lang === 'mr') ? "पुढचे उदाहरण" : "Next Question";
        } else if(state === "retry") {
            btn.innerText = (lang === 'mr') ? "पुन्हा प्रयत्न करा 🔄" : "Try Again 🔄";
        } else {
            btn.innerText = (lang === 'mr') ? "उत्तर तपासा" : "Check Answer";
        }

        renderCurrentNumbersInBoxes();
        renderOptions();
    }

    function setInstructionText() {
        let lang = currentLanguage();
        let inst = document.getElementById("instruction-text");
        if(!inst) return;
        if(gameType === "before") {
            inst.innerText = (lang === 'mr') ? "🤔 आधीची संख्या ओळखा! (Before)" : "🤔 Find the Before Number!";
        } else if(gameType === "after") {
            inst.innerText = (lang === 'mr') ? "🤔 नंतरची संख्या ओळखा! (After)" : "🤔 Find the After Number!";
        } else {
            inst.innerText = (lang === 'mr') ? "🤔 मधली संख्या ओळखा! (Between)" : "🤔 Find the Middle Number!";
        }
    }

    function setButtonState(state) {
        let btn = document.getElementById("action-btn");
        let lang = currentLanguage();
        btn.setAttribute("data-state", state);
        
        if(state === "next") {
            btn.innerText = (lang === 'mr') ? "पुढचे उदाहरण" : "Next Question";
            btn.onclick = generateQuestion;
        } else if(state === "retry") {
            btn.innerText = (lang === 'mr') ? "पुन्हा प्रयत्न करा 🔄" : "Try Again 🔄";
            btn.onclick = retryCurrentQuestion;
        } else {
            btn.innerText = (lang === 'mr') ? "उत्तर तपासा" : "Check Answer";
            btn.onclick = checkAnswer;
        }
    }

    function generateQuestion() {
        selectedAns = null;
        isReviewState = false;
        
        const types = ["before", "after", "middle"];
        gameType = types[Math.floor(Math.random() * types.length)];
        
        let rangeDiff = maxRange - minRange + 1;
        let baseNum;
        
        do {
            baseNum = Math.floor(Math.random() * (rangeDiff - 2)) + minRange; 
        } while (baseNum === lastCorrectAns && rangeDiff > 3);
        
        lastCorrectAns = baseNum;

        n1 = baseNum;
        n2 = baseNum + 1;
        n3 = baseNum + 2;

        if (gameType === "before") correctAns = n1;
        else if (gameType === "middle") correctAns = n2;
        else correctAns = n3;

        let res = document.getElementById("result-message");
        if(res) res.innerText = "";
        
        let optionsSet = new Set();
        optionsSet.add(correctAns);
        
        while(optionsSet.size < Math.min(4, rangeDiff)) {
            let randOpt = Math.floor(Math.random() * rangeDiff) + minRange;
            optionsSet.add(randOpt);
        }
        
        if(optionsSet.size < 4) {
            for(let i=minRange; i<=maxRange; i++) {
                optionsSet.add(i);
                if(optionsSet.size === 4) break;
            }
        }
        
        generatedOptions = Array.from(optionsSet).sort(() => Math.random() - 0.5);
        
        updateLanguageUI();
        setButtonState("check");
    }

    function renderCurrentNumbersInBoxes() {
        let lang = currentLanguage();
        let b1 = document.getElementById("box-1");
        let b2 = document.getElementById("box-2");
        let b3 = document.getElementById("box-3");
        
        if(!b1 || !b2 || !b3) return;

        b1.className = "num-box";
        b2.className = "num-box";
        b3.className = "num-box";

        b1.innerText = (lang === 'mr') ? convertToMarathi(n1) : n1;
        b2.innerText = (lang === 'mr') ? convertToMarathi(n2) : n2;
        b3.innerText = (lang === 'mr') ? convertToMarathi(n3) : n3;

        if(gameType === "before") {
            b1.className = "num-box missing";
            b1.innerText = (selectedAns !== null) ? ((lang === 'mr') ? convertToMarathi(selectedAns) : selectedAns) : "?";
            if(selectedAns !== null) b1.classList.add("filled");
        } else if(gameType === "middle") {
            b2.className = "num-box missing";
            b2.innerText = (selectedAns !== null) ? ((lang === 'mr') ? convertToMarathi(selectedAns) : selectedAns) : "?";
            if(selectedAns !== null) b2.classList.add("filled");
        } else if(gameType === "after") {
            b3.className = "num-box missing";
            b3.innerText = (selectedAns !== null) ? ((lang === 'mr') ? convertToMarathi(selectedAns) : selectedAns) : "?";
            if(selectedAns !== null) b3.classList.add("filled");
        }
    }

    function renderOptions() {
        let lang = currentLanguage();
        let optContainer = document.getElementById("options-container");
        if(!optContainer) return;
        
        optContainer.innerHTML = "";
        
        generatedOptions.forEach(val => {
            let displayVal = (lang === 'mr') ? convertToMarathi(val) : val;
            let btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.id = "opt-" + val;
            btn.innerText = displayVal;
            btn.onclick = function() { selectNumber(val); };
            
            if(isReviewState && val === selectedAns) {
                btn.disabled = true;
            }
            
            optContainer.appendChild(btn);
        });
    }

    function selectNumber(val) {
        selectedAns = val;
        renderCurrentNumbersInBoxes();
        
        let btns = document.querySelectorAll(".opt-btn");
        btns.forEach(b => b.style.borderColor = "rgba(0, 242, 254, 0.5)");
        
        let selectedBtn = document.getElementById("opt-" + val);
        if(selectedBtn) {
            selectedBtn.style.borderColor = "#00e676";
        }
    }

    function checkAnswer() {
        let lang = currentLanguage();
        if(selectedAns === null) {
            alert((lang === 'mr') ? "कृपया आधी एक अंक निवडा!" : "Please select a number first!");
            return;
        }
        
        let res = document.getElementById("result-message");
        let activeMissingBox = document.querySelector(".num-box.missing");
        
        if(selectedAns === correctAns) {
            playCorrectSound(); // 🔊 बरोबर उत्तराचा आवाज
            res.innerText = (lang === 'mr') ? "✓ वा! अगदी बरोबर उत्तर आहे. 🎉" : "✓ Wow! Correct Answer. 🎉";
            res.className = "result correct";
            if(activeMissingBox) activeMissingBox.className = "num-box missing filled success-state";
            
            if(!isReviewState) {
                score++;
                document.getElementById("score-board-count").innerText = "SCORE: " + ((lang === 'mr') ? convertToMarathi(score) : score);
            }
            disableAllOptions();
            setButtonState("next");
        } else {
            playWrongSound(); // 🔊 चुकीच्या उत्तराचा आवाज
            res.innerText = (lang === 'mr') ? "✗ चुकीचे उत्तर! पुन्हा प्रयत्न करा." : "✗ Wrong Answer! Try again.";
            res.className = "result wrong";
            if(activeMissingBox) activeMissingBox.className = "num-box missing filled error-state";
            
            let badBtn = document.getElementById(`opt-${selectedAns}`);
            if(badBtn) badBtn.disabled = true;
            isReviewState = true; 
            setButtonState("retry");
        }
    }

    function disableAllOptions() {
        let btns = document.querySelectorAll(".opt-btn");
        btns.forEach(b => b.disabled = true);
    }

    function retryCurrentQuestion() {
        selectedAns = null;
        isReviewState = false;
        renderCurrentNumbersInBoxes();
        document.getElementById("result-message").innerText = "";
        
        generatedOptions.forEach(val => {
            let btn = document.getElementById(`opt-${val}`);
            if(btn) {
                btn.disabled = false;
                btn.style.borderColor = "rgba(0, 242, 254, 0.5)";
            }
        });
        setButtonState("check");
    }

    window.onload = function() {
        generateQuestion();
    };
</script>
</body>
</html>

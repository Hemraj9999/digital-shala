<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>डिजिटल शाळा - मुख्य पान</title>
    <style>
        :root { 
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b); 
            --card-bg: #1e293b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-gradient); 
            color: #f8fafc; 
            min-height: 100vh; 
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main-title {
            font-size: 26px;
            font-weight: 800;
            color: #00f2fe;
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 40px;
            text-align: center;
        }

        .menu-grid {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 25px 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .menu-card:active { transform: scale(0.96); }

        .icon-box {
            font-size: 45px;
            width: 65px;
            height: 65px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .text-box h3 {
            font-size: 19px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .text-box p {
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="main-title">✨ डिजिटल बालशाळा ✨</div>
    <div class="subtitle">पाचोरा पॅटर्न डिजिटल शिक्षण</div>

    <div class="menu-grid">
        
        <a href="abc.html" class="menu-card" style="border-left: 6px solid #00f2fe;">
            <div class="icon-box">🔤</div>
            <div class="text-box">
                <h3>English Learning</h3>
                <p>फोर-लाईन पाटी आणि उच्चार</p>
            </div>
        </a>

        <a href="ganit.html" class="menu-card" style="border-left: 6px solid #10b981;">
            <div class="icon-box">🔢</div>
            <div class="text-box">
                <h3>गणिताची गंमत</h3>
                <p>अंक, मोजणी, बेरीज आणि पजल खेळ</p>
            </div>
        </a>

    </div>

</body>
</html>

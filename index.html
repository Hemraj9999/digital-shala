<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>डिजिटल शाळा - मुख्य पान</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 20px 15px; min-height: 100vh; }
        .main-title { text-align: center; font-size: 24px; font-weight: 800; color: #ff6b6b; margin-bottom: 25px; margin-top: 10px; }
        
        .section-title { font-size: 18px; font-weight: 700; color: #00f2fe; margin: 20px 0 10px 5px; display: flex; align-items: center; gap: 8px; }
        
        .grid-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 410px; margin: 0 auto; }
        
        .card { 
            background: #1e293b; 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 20px; 
            padding: 16px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            text-decoration: none;
            color: inherit;
        }
        .card:active { background: #25334d; }
        
        .icon-box { width: 60px; height: 60px; background: rgba(255,255,255,0.05); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        
        .card-info h3 { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
        .card-info p { font-size: 12px; color: #94a3b8; line-height: 1.4; }
    </style>
</head>
<body>

    <h2 class="main-title">🏫 माझी डिजिटल शाळा</h2>

    <div class="grid-container">
        
        <div class="section-title">🔸 गणित डिजिटल शाळा</div>
        
        <a href="ganit.html" class="card">
            <div class="icon-box">💎</div>
            <div class="card-info">
                <h3>१. गणित विषय खेळ</h3>
                <p>अंक ओळख, बेरीज आणि संख्या मोजणे यांचे मजेदार खेळ खेळा.</p>
            </div>
        </a>

        <div class="section-title">🔸 इंग्रजी डिजिटल शाळा</div>
        
        <a href="abc.html" class="card" style="border-color: rgba(0, 242, 254, 0.2);">
            <div class="icon-box">🔤</div>
            <div class="card-info">
                <h3>१. A to Z Phonics Smart Shala</h3>
                <p>लाल आणि निळ्या फोर-लाईन (Four Line) मध्ये आवाजसहित लहान व मोठी लिपी शिका.</p>
            </div>
        </a>

    </div>

</body>
</html>

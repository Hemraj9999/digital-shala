<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Shala - Home</title>
    <style>
        :root { 
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b); 
            --text-color: #f8fafc;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-gradient); 
            color: var(--text-color); 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 800;
            color: #00f2fe;
            margin-bottom: 5px;
            text-align: center;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 35px;
            text-align: center;
        }
        
        .menu-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 🚪 विषयांची मोठी आणि सुंदर बटणे */
        .menu-card {
            background: #1e293b;
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 25px 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s, border-color 0.2s;
        }

        .menu-card:active {
            transform: scale(0.96);
        }

        /* इंग्रजी विषयाचा रंग */
        .menu-card.english-btn {
            border-left: 6px solid #00f2fe;
        }
        .menu-card.english-btn:active { border-color: #00f2fe; }

        /* गणित विषयाचा रंग */
        .menu-card.math-btn {
            border-left: 6px solid #10b981;
        }
        .menu-card.math-btn:active { border-color: #10b981; }

        .icon-box {
            font-size: 45px;
        }

        .text-box h3 {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .text-box p {
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="welcome-title">✨ डिजिटल बालशाळा ✨</div>
    <div class="welcome-subtitle">शिकूया आनंदाने आणि खेळत खेळत!</div>

    <div class="menu-container">
        
        <a href="abc.html" class="menu-card english-btn">
            <div class="icon-box">🔤</div>
            <div class="text-box">
                <h3>English Phonics</h3>
                <p>फोर-लाईन पाटी आणि साऊंड</p>
            </div>
        </a>

        <a href="math_drag.html" class="menu-card math-btn">
            <div class="icon-box">🔢</div>
            <div class="text-box">
                <h3>Math Puzzle</h3>
                <p>संख्या उचलून खाचेत बसवा</p>
            </div>
        </a>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>गणित प्रगत शाळा - Digital Shala</title>
    <style>
        :root {
            --primary: #ff9f43;
            --primary-glow: rgba(255, 159, 67, 0.4);
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background: var(--bg-gradient); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* प्रगत आणि युनिक हेडर */
        header { 
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border);
            padding: 15px 25px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn { 
            color: #94a3b8; 
            text-decoration: none; 
            font-weight: 600; 
            background: rgba(255,255,255,0.05); 
            padding: 10px 20px; 
            border-radius: 30px; 
            font-size: 14px;
            border: 1px solid var(--card-border);
            transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.15); color: #fff; transform: translateX(-3px); }

        header h2 { font-size: 22px; font-weight: 700; background: linear-gradient(90deg, #ff9f43, #ff5252); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* हाय-टेक नेव्हिगेशन टॅब्स */
        .sub-nav { 
            display: flex; 
            background: rgba(15, 23, 42, 0.6);
            padding: 8px;
            border-radius: 40px;
            margin: 25px auto; 
            max-width: 550px;
            width: 90%;
            border: 1px solid var(--card-border);
        }
        .nav-tab { 
            flex: 1; 
            padding: 12px 20px; 
            font-size: 15px; 
            font-weight: 600; 
            color: #94a3b8; 
            cursor: pointer; 
            border-radius: 30px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            text-align: center;
        }
        .nav-tab.active { 
            color: #fff; 
            background: linear-gradient(135deg, #ff9f43, #ff6b6b);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* मुख्य कंटेनर (Dashboard Style) */
        .game-container { 
            max-width: 550px; 
            width: 92%;
            margin: 0 auto 40px auto; 
            background: var(--card-bg); 
            padding: 30px 25px; 
            border-radius: 24px; 
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* प्रीमियम इन्स्ट्रक्शन बॉक्स */
        .instruction-box { 
            background: rgba(255, 159, 67, 0.08); 
            padding: 15px; 
            border-radius: 16px; 
            border-left: 4px solid var(--primary); 
            margin-bottom: 25px; 
            text-align: left;
        }
        .inst-mr { font-size: 15px; font-weight: 600; color: #ffad5a; }

        /* भाषा निवड पॅनेल (Futuristic Radio) */
        .lang-selector-box { 
            background: rgba(0,0,0,0.2); 
            padding: 10px; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border: 1px solid rgba(255,255,255,0.03);
        }
        .lang-title { font-size: 14px; font-weight: 600; color: #64748b; }
        .lang-label { 
            font-size: 15px; 
            font-weight: 600; 
            color: #cbd5e1; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 6px 16px;
            border-radius: 10px;
            transition: background 0.3s;
        }
        .lang-label:has(input:checked) {
            background: rgba(255,255,255,0.08);
            color: var(--primary);
        }
        .lang-label input { transform: scale(1.2); accent-color: var(--primary); }

        /* ड्रॉपडाऊन स्टाइल */
        .range-selector-box { margin-bottom: 25px; text-align: left; }
        .range-selector-box label { font-size: 14px; font-weight: 600; color: #94a3b8; display: block; margin-bottom: 8px; margin-left: 5px; }
        .select-input { 
            font-size: 16px; 
            padding: 14px; 
            border-radius: 14px; 
            border: 2px solid var(--card-border); 
            width: 100%; 
            font-weight: 600; 
            color: #fff; 
            outline: none; 
            background: #1e293b; 
            cursor: pointer; 
            transition: all 0.3s;
        }
        .select-input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

        .game-section { display: none; }
        .game-section.active { display: block; animation: fadeIn 0.5s ease-in-out; }

        /* अंकांचे ग्रॅव्हिटी ग्रीड बटन्स */
        .numbers-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; margin: 20px auto; }
        .num-speak-btn { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--card-border); 
            border-radius: 20px; 
            padding: 25px 15px; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }
        .num-speak-btn::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,159,67,0.1), rgba(255,82,82,0.1));
            opacity: 0; transition: opacity 0.3s;
        }
        .num-speak-btn:hover { 
            transform: translateY(-4px); 
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(255, 159, 67, 0.15);
        }
        .num-speak-btn:hover::before { opacity: 1; }
        .num-speak-btn:active { transform: translateY(1px); }
        
        .num-speak-btn .big-digit { font-size: 46px; font-weight: 800; color: #fff; z-index: 2; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .num-speak-btn .audio-icon { font-size: 12px; margin-top: 8px; color: var(--primary); font-weight: 700; z-index: 2; background: rgba(255,159,67,0.1); padding: 4px 12px; border-radius: 20px; }

        /* सायबरपंक बेरीज स्टाइल */
        .score-board { font-size: 16px; font-weight: 700; background: #10b981; color: white; padding: 8px 18px; display: inline-block; border-radius: 30px; margin-bottom: 25px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .math-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; margin: 25px 0; background: rgba(0,0,0,0.15); padding: 25px; border-radius: 20px; border: 1px solid var(--card-border); }
        .row-item { display: flex; align-items: center; width: 100%; background: rgba(255,255,255,0.02); padding: 12px 18px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .num-display { font-size: 42px; font-weight: 800; width: 70px; color: #fff; text-align: center; }
        .design-display { flex: 1; font-size: 28px; letter-spacing: 6px; text-align: left; padding-left: 20px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
        .count-box { width: 90px; font-size: 18px; padding: 10px; text-align: center; border: 2px solid var(--card-border); border-radius: 10px; font-weight: 700; background: #0f172a; color: #fff; outline: none; }
        .count-box:focus { border-color: var(--primary); }
        .sign-row { font-size: 38px; font-weight: 800; width: 100%; text-align: left; padding-left: 25px; color: #94a3b8; }
        .line { border-bottom: 3px dashed var(--card-border); width: 100%; margin: 5px 0; }
        .final-input-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; width: 100%; }
        .final-ans { font-size: 38px; width: 140px; text-align: center; padding: 10px; border: 3px solid var(--primary); border-radius: 14px; outline: none; background: #0f172a; color: #fff; box-shadow: 0 0 15px var(--primary-glow); }
        
        .submit-btn { font-size: 18px; background: linear-gradient(135deg, #ff9f43, #ff5252); color: white; border: none; padding: 16px 35px; border-radius: 16px; cursor: pointer; font-weight: 700; margin-top: 20px; width: 100%; box-shadow: 0 6px 20px var(--primary-glow); transition: all 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 159, 67, 0.5); }
        
        .result { font-size: 22px; font-weight: 700; margin-top: 20px; min-height: 40px; }
        .correct { color: #34d399; text-shadow: 0 0 10px rgba(52, 211, 153, 0.3); }
        .wrong { color: #f87171; text-shadow: 0 0 10px rgba(248, 113, 113, 0.3); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">⬅ Home</a>
    <h2>🔢 DIGITAL SHALA PRO</h2>
    <div style="width:85px;"></div>
</header>

<div class="sub-nav">
    <div id="tab-learn" class="nav-tab active" onclick="switchGameMode('learn')">💎 अंक ओळख (1-1000)</div>
    <div id="tab-add" class="nav-tab" onclick="switchGameMode('add')">⚡ चित्रे व बेरीज</div>
</div>

<div class="game-container">

    <div id="section-learn" class="game-section active">
        
        <div class="lang-selector-box">
            <span class="lang-title">🗣️ MODE:</span>
            <label class="lang-label">
                <input type="radio" name="lang-select" value="mr" checked onchange="changeLanguage()"> 🚩 मराठी
            </label>
            <label class="lang-label">
                <input type="radio" name="lang-select" value="en" onchange="changeLanguage()"> 🔤 English
            </label>
        </div>

        <div class="instruction-box">
            <div class="inst-mr" id="inst-text">अंकांचा गट निवडा आणि ऐकण्यासाठी बतनावर दाबा!</div>
        </div>
        
        <div class="range-selector-box">
            <label id="dropdown-label">अंकांचा गट निवडा:</label>
            <select id="ten-range-select" class="select-input" onchange="showNumbersGrid()">
                </select>
        </div>

        <div id="numbers-grid-container" class="numbers-grid"></div>
    </div>

    <div id="section-add" class="game-section">
        <div style="text-align: center;"><div class="score-board" id="score-board">SCORE: ०</div></div>
        
        <div class="instruction-box">
            <div class="inst-mr" style="color:#34d399">चित्रे मोजा आणि अचूक बेरीज करा!</div>
        </div>
        
        <div class="math-wrapper">
            <div class="row-item">
                <div class="num-display" id="num1">0</div>
                <div class="design-display" id="design1">🎈🎈🎈</div>
                <input type="number" class="count-box" id="box1" placeholder="?">
            </div>
            <div class="sign-row">+</div>
            <div class="row-item">
                <div class="num-display" id="num2">0</div>
                <div class="design-display" id="design2">🎈🎈</div>
                <input type="number" class="count-box" id="box2" placeholder="?">
            </div>
            <div class="line"></div>
            <div class="final-input-row">
                <span style="font-size: 20px; font-weight: 700; color: #94a3b8;">एकूण उत्तर =</span>
                <input type="number" class="final-ans" id="user-answer" placeholder="?">
            </div>
        </div>
        <button id="action-btn" class="submit-btn" onclick="checkAnswer()">उत्तर तपासा</button>
        <div class="result" id="result-message"></div>
    </div>

</div>

<script>
    let score = 0, n1 = 0, n2 = 0;
    const designs = ["🎈", "⭐", "🍎", "⚽", "🌸", "🍦"];
    
    const marathiDigits = {
        '0': '०', '1': '१', '2': '२', '3': '३', '4': '४', '5': '५', '6': '६', '7': '७', '8': '८', '9': '९'
    };

    function convertToMarathi(number) {
        return number.toString().split('').map(digit => marathiDigits[digit] || digit).join('');
    }

    function currentLanguage() {
        return document.querySelector('input[name="lang-select"]:checked').value;
    }

    function switchGameMode(mode) {
        document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        if(mode === 'learn') {
            document.getElementById('section-learn').classList.add('active');
            document.getElementById('tab-learn').classList.add('active');
        } else {
            document.getElementById('section-add').classList.add('active');
            document.getElementById('tab-add').classList.add('active');
            generateQuestion(); 
        }
    }

    function changeLanguage() {
        let lang = currentLanguage();
        let inst = document.getElementById("inst-text");
        let dropLabel = document.getElementById("dropdown-label");

        if(lang === 'mr') {
            inst.innerText = "अंकांचा गट निवडा आणि ऐकण्यासाठी बतनावर दाबा!";
            dropLabel.innerText = "अंकांचा गट निवडा:";
        } else {
            inst.innerText = "Select number group and click on button to hear sound!";
            dropLabel.innerText = "Select Number Group:";
        }

        initializeDropdown();
        showNumbersGrid();
    }

    function initializeDropdown() {
        let select = document.getElementById("ten-range-select");
        let currentSelection = select.value || 1; 
        select.innerHTML = ""; 
        let lang = currentLanguage();
        
        for (let i = 1; i <= 1000; i += 10) {
            let start = i;
            let end = i + 9;
            if(end > 1000) end = 1000;
            
            let option = document.createElement("option");
            option.value = start;
            
            if(lang === 'mr') {
                option.innerText = `${convertToMarathi(start)} ते ${convertToMarathi(end)}`;
            } else {
                option.innerText = `${start} to ${end}`;
            }
            select.appendChild(option);
        }
        select.value = currentSelection;
    }

    function showNumbersGrid() {
        let startNum = parseInt(document.getElementById("ten-range-select").value);
        let gridContainer = document.getElementById("numbers-grid-container");
        gridContainer.innerHTML = ""; 

        let endNum = startNum + 9;
        if(endNum > 1000) endNum = 1000;
        let lang = currentLanguage();

        for (let num = startNum; num <= endNum; num++) {
            let displayNum = (lang === 'mr') ? convertToMarathi(num) : num;
            let listenText = (lang === 'mr') ? "🔊 ऐका" : "🔊 Listen";
            
            gridContainer.innerHTML += `
                <button class="num-speak-btn" onclick="playNumberVoice(${num})">
                    <span class="big-digit">${displayNum}</span>
                    <span class="audio-icon">${listenText}</span>
                </button>
            `;
        }
    }

    function playNumberVoice(num) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            let utterance = new SpeechSynthesisUtterance(num);
            let lang = currentLanguage();
            
            if(lang === 'mr') {
                utterance.lang = 'mr-IN'; 
                utterance.rate = 0.8;
            } else {
                utterance.lang = 'en-US'; 
                utterance.rate = 0.8;
            }
            window.speechSynthesis.speak(utterance);
        }
    }

    function generateQuestion() {
        n1 = Math.floor(Math.random() * 8) + 1;
        n2 = Math.floor(Math.random() * 8) + 1;
        document.getElementById("num1").innerText = n1;
        document.getElementById("num2").innerText = n2;
        let icon = designs[Math.floor(Math.random() * designs.length)];
        document.getElementById("design1").innerText = icon.repeat(n1);
        document.getElementById("design2").innerText = icon.repeat(n2);
        document.getElementById("box1").value = "";
        document.getElementById("box2").value = "";
        document.getElementById("user-answer").value = "";
        document.getElementById("result-message").innerText = "";
        let btn = document.getElementById("action-btn");
        btn.innerText = "उत्तर तपासा";
        btn.setAttribute("onclick", "checkAnswer()");
    }

    function checkAnswer() {
        let ans = parseInt(document.getElementById("user-answer").value);
        let correct = n1 + n2;
        let res = document.getElementById("result-message");
        if(ans === correct) {
            res.innerText = "✓ बरोबर उत्तर! 🎉"; res.className = "result correct"; score++;
        } else {
            res.innerText = "✗ चुकीचे! योग्य उत्तर: " + correct; res.className = "result wrong";
        }
        document.getElementById("score-board").innerText = "SCORE: " + (currentLanguage() === 'mr' ? convertToMarathi(score) : score);
        let btn = document.getElementById("action-btn");
        btn.innerText = "पुढचे उदाहरण";
        btn.setAttribute("onclick", "generateQuestion()");
    }

    window.onload = function() {
        initializeDropdown(); 
        showNumbersGrid();    
        switchGameMode('learn');
    };
</script>
</body>
</html>

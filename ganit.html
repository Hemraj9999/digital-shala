<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>गणित विषय सूची - Digital Shala Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-gradient); color: #f8fafc; min-height: 100vh; text-align: center; padding: 20px; }
        
        header { max-width: 600px; margin: 20px auto; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { color: #94a3b8; text-decoration: none; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 30px; font-size: 14px; border: 1px solid var(--card-border); transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        header h2 { font-size: 24px; font-weight: 700; background: linear-gradient(90deg, #ff9f43, #ff5252); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .menu-container { max-width: 500px; margin: 40px auto; display: flex; flex-direction: column; gap: 20px; width: 92%; }
        
        /* विषय निवडीचे कार्ड्स */
        .menu-card { 
            background: var(--card-bg); 
            border: 1px solid var(--card-border); 
            border-radius: 20px; 
            padding: 25px; 
            text-decoration: none; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .menu-card:hover { transform: translateY(-5px); border-color: #ff9f43; box-shadow: 0 10px 20px rgba(255, 159, 67, 0.2); }
        .card-icon { font-size: 40px; background: rgba(255,255,255,0.05); width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; border-radius: 15px; }
        .card-info { text-align: left; }
        .card-info h3 { font-size: 18px; margin-bottom: 5px; color: #ffad5a; }
        .card-info p { font-size: 13px; color: #94a3b8; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">⬅ मुख्य पान</a>
    <h2>🔢 गणित डिजिटल शाळा</h2>
    <div style="width:85px;"></div>
</header>

<div class="menu-container">
    <a href="ank_olakha.html" class="menu-card">
        <div class="card-icon">💎</div>
        <div class="card-info">
            <h3>१. अंक ओळख (1 to 1000)</h3>
            <p>मराठी आणि इंग्रजी दोन्ही भाषांमध्ये १ ते १००० अंक ऐका व शिका.</p>
        </div>
    </a>

    <a href="sankhya_mojne.html" class="menu-card">
        <div class="card-icon">✨</div>
        <div class="card-info">
            <h3>२. संख्या मोजणे (Count)</h3>
            <p>वेगवेगळी चित्रे मोजा आणि योग्य संख्या निवडून बॉक्स भरा.</p>
        </div>
    </a>

    <a href="chitre_berij.html" class="menu-card">
        <div class="card-icon">⚡</div>
        <div class="card-info">
            <h3>३. चित्रे व बेरीज (Addition)</h3>
            <p>चित्रे मोजून त्यांची बेरीज करण्याचा सराव करा.</p>
        </div>
    </a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>संख्या मोजणे खेळ (Pro)</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --panel-bg: #1e293b;
            --primary: #10b981;
            --primary-hover: #059669;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            user-select: none;
        }

        header {
            width: 100%;
            max-width: 450px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .back-btn {
            color: #10b981;
            text-decoration: none;
            background: rgba(16, 185, 129, 0.1);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .game-panel {
            background: rgba(30, 41, 59, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .score-box {
            background: #00f2fe;
            color: #0f172a;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 14px;
        }

        /* 🌐 भाषा निवडण्याचे सुंदर बटण */
        .lang-switch {
            display: flex;
            background: #0f172a;
            border-radius: 12px;
            padding: 2px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: #10b981;
            color: #fff;
            box-shadow: 0 2px 6px rgba(16, 185, 129, 0.3);
        }

        .setup-section {
            margin-bottom: 20px;
            text-align: left;
        }

        .setup-section label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: 600;
        }

        select {
            width: 100%;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            outline: none;
        }

        .instruction {
            color: #00f2fe;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .display-board {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            min-height: 120px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        .item-emoji {
            font-size: 35px;
            animation: popIn 0.3s ease;
            display: inline-block;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .target-slot {
            width: 65px;
            height: 65px;
            border: 2px dashed #10b981;
            background: rgba(16, 185, 129, 0.05);
            border-radius: 14px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: #10b981;
        }

        .target-slot.success {
            background: #10b981;
            color: #fff;
            border-style: solid;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            height: 55px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .option-btn:active {
            background: #334155;
            transform: scale(0.95);
        }

        .next-btn {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .next-btn:active {
            background: var(--primary-hover);
        }

        .feedback-text {
            margin-top: 12px;
            font-size: 15px;
            font-weight: 700;
            min-height: 22px;
        }
    </style>
</head>
<body>

    <header>
        <a href="ganit.html" class="back-btn">⬅ मागे</a>
        <div style="font-size: 16px; font-weight: 800; color: #10b981;">🍎 संख्या मोजणे खेळ</div>
        <div style="width:50px;"></div>
    </header>

    <div class="game-panel">
        <div class="stats-bar">
            <div class="score-box" id="score-display">SCORE: ०</div>
            
            <div class="lang-switch">
                <button class="lang-btn active" id="lang-mr" onclick="setLanguage('mr')">मराठी</button>
                <button class="lang-btn" id="lang-en" onclick="setLanguage('en')">EN</button>
            </div>
        </div>

        <div class="setup-section">
            <label id="label-range">🎯 अभ्यासासाठी संख्या गट निवडा:</label>
            <select id="range-selector" onchange="initGame()">
                <option value="1-10">🔢 गट: १ ते १० (1 to 10)</option>
                <option value="1-20">🔢 गट: १ ते २० (1 to 20)</option>
            </select>
        </div>

        <div class="instruction" id="text-instruction">चित्रे मोजा आणि योग्य अंक निवडून बॉक्स भरा!</div>

        <div class="display-board" id="item-board"></div>

        <div class="target-slot" id="answer-slot">?</div>

        <div class="options-grid" id="options-box"></div>

        <button class="next-btn" id="btn-next" onclick="initGame()">पुढचे उदाहरण ➡️</button>
        
        <div class="feedback-text" id="feedback"></div>
    </div>

<script>
    let currentCount = 0;
    let score = 0;
    let currentLang = 'mr'; // डीफॉल्ट भाषा मराठी
    const emojis = ['🍎', '🥭', '⭐', '🎈', '🍉', '🐱', '🦋', '🚗', '🍦', '🌻'];
    
    const marathiNumbers = {
        0:'०', 1:'१', 2:'२', 3:'३', 4:'४', 5:'५', 6:'६', 7:'७', 8:'८', 9:'९', 10:'१०',
        11:'११', 12:'१२', 13:'१३', 14:'१४', 15:'१५', 16:'१६', 17:'१७', 18:'१८', 19:'१९', 20:'२०'
    };

    let synth = window.speechSynthesis;
    let allVoices = [];

    function populateVoices() {
        if (!synth) return;
        allVoices = synth.getVoices();
    }
    if (synth && synth.onvoiceschanged !== undefined) {
        synth.onvoiceschanged = populateVoices;
    }
    populateVoices();

    function setLanguage(lang) {
        currentLang = lang;
        document.getElementById("lang-mr").classList.toggle("active", lang === 'mr');
        document.getElementById("lang-en").classList.toggle("active", lang === 'en');
        
        // UI मजकूर भाषानुसार बदलणे
        if(lang === 'mr') {
            document.getElementById("label-range").innerText = "🎯 अभ्यासासाठी संख्या गट निवडा:";
            document.getElementById("text-instruction").innerText = "चित्रे मोजा आणि योग्य अंक निवडून बॉक्स भरा!";
            document.getElementById("btn-next").innerText = "पुढचे उदाहरण ➡️";
            document.getElementById("score-display").innerText = "SCORE: " + convertNum(score);
        } else {
            document.getElementById("label-range").innerText = "🎯 Select Number Range:";
            document.getElementById("text-instruction").innerText = "Count the items and select the correct number!";
            document.getElementById("btn-next").innerText = "Next Example ➡️";
            document.getElementById("score-display").innerText = "SCORE: " + score;
        }
        initGame();
    }

    function convertNum(num) {
        if (currentLang === 'mr') {
            return marathiNumbers[num] || num;
        }
        return num;
    }

    function initGame() {
        document.getElementById("answer-slot").innerText = "?";
        document.getElementById("answer-slot").className = "target-slot";
        document.getElementById("feedback").innerText = "";

        let range = document.getElementById("range-selector").value;
        let max = range === "1-10" ? 10 : 20;
        currentCount = Math.floor(Math.random() * max) + 1;

        let itemBoard = document.getElementById("item-board");
        itemBoard.innerHTML = "";
        let randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
        
        for(let i=0; i < currentCount; i++) {
            let span = document.createElement("span");
            span.className = "item-emoji";
            span.innerText = randomEmoji;
            itemBoard.appendChild(span);
        }

        let options = [currentCount];
        while(options.length < 4) {
            let rand = Math.floor(Math.random() * max) + 1;
            if(!options.includes(rand)) options.push(rand);
        }
        options.sort(() => Math.random() - 0.5);

        let optionsBox = document.getElementById("options-box");
        optionsBox.innerHTML = "";
        options.forEach(num => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = convertNum(num);
            btn.onclick = () => checkAnswer(num);
            optionsBox.appendChild(btn);
        });
    }

    function checkAnswer(selectedNum) {
        let slot = document.getElementById("answer-slot");
        slot.innerText = convertNum(currentCount);

        if(selectedNum === currentCount) {
            score++;
            document.getElementById("score-display").innerText = "SCORE: " + convertNum(score);
            slot.className = "target-slot success";
            
            if(currentLang === 'mr') {
                document.getElementById("feedback").innerText = "✔ बरोबर उत्तर आहे! 🎉";
                document.getElementById("feedback").style.color = "#10b981";
                speakUniversal(currentCount.toString(), 'mr-IN');
            } else {
                document.getElementById("feedback").innerText = "✔ Correct Answer! 🎉";
                document.getElementById("feedback").style.color = "#10b981";
                speakUniversal(currentCount.toString(), 'en-US');
            }
        } else {
            slot.className = "target-slot";
            slot.style.borderColor = "#ff6b6b";
            slot.style.color = "#ff6b6b";
            
            if(currentLang === 'mr') {
                document.getElementById("feedback").innerText = "❌ चुकीचे उत्तर! पुन्हा प्रयत्न करा.";
                document.getElementById("feedback").style.color = "#ff6b6b";
                speakUniversal("पुन्हा प्रयत्न करा", 'mr-IN');
            } else {
                document.getElementById("feedback").innerText = "❌ Wrong Answer! Try Again.";
                document.getElementById("feedback").style.color = "#ff6b6b";
                speakUniversal("Try again", 'en-US');
            }
        }
    }

    // 🔊 मोबाईल आणि कॉम्प्युटर दोन्हीसाठी १००% चालणारा व्हॉईस पॅटर्न
    function speakUniversal(text, langCode) {
        if (!synth) return;
        synth.cancel(); 

        let utter = new SpeechSynthesisUtterance(text);
        
        // कॉम्प्युटरसाठी अचूक व्हॉईस मॅचिंग फिल्टर
        populateVoices();
        let targetVoice = allVoices.find(v => v.lang.startsWith(langCode) || v.lang.includes(langCode.replace('-', '_')));
        
        if (targetVoice) {
            utter.voice = targetVoice;
        } else {
            utter.lang = langCode; // मोबाईलसाठी थेट लँग्वेज कोड जो फिक्स काम करतो
        }

        // आवाजाची सुस्पष्टता सुधारण्यासाठी संथ गती
        if(langCode.startsWith('mr')) {
            utter.rate = 0.75; 
        } else {
            utter.rate = 0.85;
        }
        
        synth.speak(utter);
    }

    window.onload = () => {
        populateVoices();
        initGame();
    };
</script>
</body>
</html>

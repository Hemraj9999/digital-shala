<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>संख्या मोजणे - Digital Shala Pro</title>
    <style>
        :root { 
            --primary: #00f2fe; 
            --secondary: #4facfe;
            --success: #00e676;
            --error: #ff1744;
            --neon-glow: rgba(0, 242, 254, 0.4); 
            --bg-gradient: linear-gradient(135deg, #050b14, #101f32, #0a1128); 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-gradient); 
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
            padding-bottom: 30px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        header { 
            background: rgba(10, 20, 38, 0.6); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--glass-border); 
            padding: 8px 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            height: 50px;
        }
        
        .back-btn { 
            color: #00f2fe; 
            text-decoration: none; 
            background: rgba(0, 242, 254, 0.05); 
            padding: 5px 12px; 
            border-radius: 30px; 
            font-size: 12px; 
            font-weight: 600;
            border: 1px solid rgba(0, 242, 254, 0.2); 
        }
        
        header h2 { 
            font-size: 14px; 
            font-weight: 800; 
            background: linear-gradient(90deg, #00f2fe, #4facfe); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .game-outer-wrapper {
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .game-container { 
            max-width: 410px; 
            width: 100%; 
            background: var(--glass); 
            padding: 14px; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(20px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-board { 
            font-size: 12px; 
            font-weight: 800; 
            background: linear-gradient(135deg, #00e676, #00b0ff); 
            color: white; 
            padding: 4px 10px; 
            border-radius: 20px; 
        }
        
        .lang-selector-box { 
            background: rgba(0,0,0,0.3); 
            padding: 2px 4px; 
            border-radius: 20px; 
            display: flex; 
            border: 1px solid var(--glass-border);
        }
        .lang-label { 
            font-size: 11px; 
            font-weight: 600; 
            color: #94a3b8; 
            cursor: pointer; 
            padding: 3px 8px; 
            border-radius: 15px; 
        }
        .lang-label input { display: none; }
        .lang-label:has(input:checked) { 
            background: rgba(0, 242, 254, 0.15); 
            color: #00f2fe; 
        }

        .range-dropdown-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .range-dropdown-box label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
        }
        .styled-select {
            background: #101f32;
            color: #00f2fe;
            border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 8px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            outline: none;
            width: 100%;
        }

        .instruction-box { 
            background: rgba(0, 242, 254, 0.02); 
            padding: 6px 10px; 
            border-radius: 10px; 
            border-left: 3px solid #00f2fe; 
        }
        .inst-mr { font-size: 11px; font-weight: 600; color: #00f2fe; }
        
        .display-board-count { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 16px; 
            padding: 12px; 
            font-size: 20px; 
            min-height: 100px; 
            max-height: 160px;
            overflow-y: auto;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 4px;
            letter-spacing: 1px;
            line-height: 26px;
        }
        
        .target-drop-box { 
            width: 55px; 
            height: 55px; 
            border: 2px dashed #00f2fe; 
            border-radius: 12px; 
            background: rgba(0, 242, 254, 0.02); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; 
            font-weight: 900; 
            color: #fff; 
            margin: 2px auto; 
        }
        .target-drop-box.filled { 
            border-style: solid; 
            background: rgba(0, 242, 254, 0.1); 
            border-color: #00f2fe; 
            color: #00f2fe; 
        }
        
        .target-drop-box.error-state { border-color: var(--error) !important; color: var(--error) !important; animation: shake 0.4s ease-in-out; }
        .target-drop-box.success-state { border-color: var(--success) !important; color: var(--success) !important; }
        
        .options-flex { 
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px; 
            margin: 5px 0;
            width: 100%;
        }
        .opt-btn { 
            background: rgba(16, 31, 50, 0.9); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 12px; 
            width: 100%;
            height: 50px; 
            font-size: 18px; 
            font-weight: 800; 
            color: #f8fafc; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .opt-btn:hover { border-color: #00f2fe; color: #00f2fe; }
        .opt-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .submit-btn { 
            font-size: 14px; 
            background: linear-gradient(135deg, #00f2fe, #4facfe); 
            color: #050b14; 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 800; 
            width: 100%; 
            text-transform: uppercase;
        }
        
        .result { font-size: 14px; font-weight: 700; min-height: 20px; text-align: center; }
        .correct { color: #00e676; }
        .wrong { color: #ff1744; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

<header>
    <a href="ganit.html" class="back-btn">⬅ मागे जा</a>
    <h2>✨ संख्या मोजणे खेळ (Pro)</h2>
    <div style="width:60px;"></div>
</header>

<div class="game-outer-wrapper">
    <div class="game-container">
        <div class="top-row">
            <div class="score-board" id="score-board-count">SCORE: ०</div>
            <div class="lang-selector-box">
                <label class="lang-label"><input type="radio" name="lang-select" value="mr" checked onchange="updateLanguageUI()">🚩 मराठी</label>
                <label class="lang-label"><input type="radio" name="lang-select" value="en" onchange="updateLanguageUI()">🔤 EN</label>
            </div>
        </div>

        <div class="range-dropdown-box">
            <label id="select-range-label" for="range-select-dropdown">🎯 अभ्यासासाठी संख्या गट निवडा:</label>
            <select id="range-select-dropdown" class="styled-select" onchange="onRangeDropdownChange()">
                <option value="1-10">🔢 गट: १ ते १०</option>
                <option value="11-20">🔢 गट: ११ ते २०</option>
                <option value="21-30">🔢 गट: २१ ते ३०</option>
                <option value="31-40">🔢 गट: ३१ ते ४०</option>
                <option value="41-50">🔢 गट: ४१ ते ५०</option>
                <option value="51-60">🔢 गट: ५१ ते ६०</option>
                <option value="61-70">🔢 गट: ६१ ते ७०</option>
                <option value="71-80">🔢 गट: ७१ ते ८०</option>
                <option value="81-90">🔢 गट: ८१ ते ९०</option>
                <option value="91-100">🔢 गट: ९१ ते १००</option>
            </select>
        </div>

        <div class="instruction-box">
            <div class="inst-mr" id="instruction-text">चितře मोजा आणि योग्य अंक निवडून बॉक्स भरा!</div>
        </div>
        
        <div class="display-board-count" id="count-image-board">🎈🎈🎈</div>
        
        <div class="target-drop-box" id="drop-target-box">?</div>
        
        <div class="options-flex" id="count-options-container"></div>
        
        <button id="action-btn-count" class="submit-btn" onclick="checkCountAnswer()">उत्तर तपासा</button>
        <div class="result" id="result-message-count"></div>
    </div>
</div>

<script>
    let scoreCount = 0, correctCountAns = 0, selectedCountAns = null;
    let lastNumber = 0; 
    let isReviewState = false; 
    let generatedOptions = []; 
    
    let minRange = 1;
    let maxRange = 10;
    
    const originalDesigns = ["🎈", "⭐", "🍎", "⚽", "🌸", "🍦", "🍭", "🍩", "🚗", "🐱", "🦁", "🦖"];
    let availableDesigns = [...originalDesigns];
    const marathiDigits = {'0':'०','1':'१','2':'२','3':'३','4':'४','5':'५','6':'६','7':'७','8':'८','9':'९'};
    
    const marathiWords = ["शून्य", "एक", "दोन", "तीन", "चार", "पाच", "सहा", "सात", "आठ", "नऊ", "दहा"];

    function convertToMarathi(number) {
        return number.toString().split('').map(digit => marathiDigits[digit] || digit).join('');
    }

    function currentLanguage() {
        return document.querySelector('input[name="lang-select"]:checked').value;
    }

    // दशक-एकक सुट्टे करून बोलण्याची प्रगत पद्धत
    function getTensUnitsSpeechText(num, lang) {
        if (num <= 10) return (lang === 'mr') ? convertToMarathi(num) : num.toString();
        
        let tens = Math.floor(num / 10);
        let units = num % 10;
        
        if (lang === 'mr') {
            let tensStr = marathiWords[tens] + " दशक";
            let unitsStr = (units > 0) ? " " + marathiWords[units] : "";
            return `${tensStr}${unitsStr}... ${convertToMarathi(num)}`;
        } else {
            let tensStr = tens + " Tens";
            let unitsStr = (units > 0) ? " and " + units : "";
            return `${tensStr}${unitsStr}... ${num}`;
        }
    }

    function onRangeDropdownChange() {
        let dropdown = document.getElementById("range-select-dropdown");
        let val = dropdown.value;
        let parts = val.split("-");
        minRange = parseInt(parts[0]);
        maxRange = parseInt(parts[1]);
        
        scoreCount = 0; 
        lastNumber = 0; 
        updateLanguageUI();
        generateCountQuestion();
    }

    function speakText(text, forceLang = null) {
        let lang = forceLang || currentLanguage();
        let langCode = (lang === 'mr') ? 'mr-IN' : 'en-IN';
        
        let audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${langCode}&client=tw-ob&q=${encodeURIComponent(text)}`;
        
        let audio = new Audio(audioUrl);
        audio.play().catch(e => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = (lang === 'mr') ? 'mr-IN' : 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        });
    }

    function updateLanguageUI() {
        let lang = currentLanguage();
        let btn = document.getElementById("action-btn-count");
        let dropdown = document.getElementById("range-select-dropdown");
        
        if(lang === 'mr') {
            document.getElementById("instruction-text").innerText = "चित्रे मोजा आणि योग्य अंक निवडून बॉक्स भरा!";
            document.getElementById("select-range-label").innerText = "🎯 अभ्यासासाठी संख्या गट निवडा:";
            document.getElementById("score-board-count").innerText = "SCORE: " + convertToMarathi(scoreCount);
            
            dropdown.options[0].text = "🔢 गट: १ ते १०";
            dropdown.options[1].text = "🔢 गट: ११ ते २०";
            dropdown.options[2].text = "🔢 गट: २१ ते ३०";
            dropdown.options[3].text = "🔢 गट: ३१ ते ४०";
            dropdown.options[4].text = "🔢 गट: ४१ ते ५०";
            dropdown.options[5].text = "🔢 गट: ५१ ते ६०";
            dropdown.options[6].text = "🔢 गट: ६१ ते ७०";
            dropdown.options[7].text = "🔢 गट: ७१ ते ८०";
            dropdown.options[8].text = "🔢 गट: ८१ ते ९०";
            dropdown.options[9].text = "🔢 गट: ९१ ते १००";

            if(btn.getAttribute("data-state") === "next") btn.innerText = "पुढचे उदाहरण";
            else if(btn.getAttribute("data-state") === "retry") btn.innerText = "पुन्हा प्रयत्न करा 🔄";
            else btn.innerText = "उत्तर तपासा";
        } else {
            document.getElementById("instruction-text").innerText = "Count the pictures and select the correct number!";
            document.getElementById("select-range-label").innerText = "🎯 Select Number Group for Practice:";
            document.getElementById("score-board-count").innerText = "SCORE: " + scoreCount;
            
            dropdown.options[0].text = "🔢 Group: 1 to 10";
            dropdown.options[1].text = "🔢 Group: 11 to 20";
            dropdown.options[2].text = "🔢 Group: 21 to 30";
            dropdown.options[3].text = "🔢 Group: 31 to 40";
            dropdown.options[4].text = "🔢 Group: 41 to 50";
            dropdown.options[5].text = "🔢 Group: 51 to 60";
            dropdown.options[6].text = "🔢 Group: 61 to 70";
            dropdown.options[7].text = "🔢 Group: 71 to 80";
            dropdown.options[8].text = "🔢 Group: 81 to 90";
            dropdown.options[9].text = "🔢 Group: 91 to 100";

            if(btn.getAttribute("data-state") === "next") btn.innerText = "Next Question";
            else if(btn.getAttribute("data-state") === "retry") btn.innerText = "Try Again 🔄";
            else btn.innerText = "Check Answer";
        }
        if(selectedCountAns !== null) {
            document.getElementById("drop-target-box").innerText = (lang === 'mr') ? convertToMarathi(selectedCountAns) : selectedCountAns;
        }
        renderOptions();
    }

    function generateCountQuestion() {
        selectedCountAns = null;
        isReviewState = false;
        
        let newNumber;
        let rangeDiff = maxRange - minRange + 1;
        
        do {
            newNumber = Math.floor(Math.random() * rangeDiff) + minRange;
        } while (newNumber === lastNumber && rangeDiff > 1);
        
        correctCountAns = newNumber;
        lastNumber = correctCountAns;

        if (availableDesigns.length === 0) {
            availableDesigns = [...originalDesigns];
        }
        let randomIndex = Math.floor(Math.random() * availableDesigns.length);
        let icon = availableDesigns.splice(randomIndex, 1)[0]; 

        document.getElementById("count-image-board").innerText = icon.repeat(correctCountAns);
        resetDropBox();
        document.getElementById("result-message-count").innerText = "";
        
        // 🎯 पर्याय गायब होण्याचा बग इथे १००% फिक्स केला आहे
        let optionsSet = new Set();
        optionsSet.add(correctCountAns);
        
        let attempts = 0;
        while(optionsSet.size < 4 && attempts < 100) {
            let randOpt = Math.floor(Math.random() * rangeDiff) + minRange;
            optionsSet.add(randOpt);
            attempts++;
        }
        
        // जर अत्यंत अपवादात्मक स्थितीत सेटमध्ये ४ पर्याय पूर्ण झाले नाहीत तर मॅन्युअली भरले जातील
        if (optionsSet.size < 4) {
            for(let i = minRange; i <= maxRange; i++) {
                optionsSet.add(i);
                if(optionsSet.size === 4) break;
            }
        }
        
        generatedOptions = Array.from(optionsSet).sort(() => Math.random() - 0.5);

        renderOptions();
        setButtonState("check");
    }

    function resetDropBox() {
        let dropBox = document.getElementById("drop-target-box");
        dropBox.innerText = "?";
        dropBox.className = "target-drop-box";
    }

    function renderOptions() {
        let lang = currentLanguage();
        let optContainer = document.getElementById("count-options-container");
        if(!optContainer) return;
        optContainer.innerHTML = "";
        
        generatedOptions.forEach(val => {
            let displayVal = (lang === 'mr') ? convertToMarathi(val) : val;
            optContainer.innerHTML += `<button class="opt-btn" id="opt-${val}" onclick="selectCountNumber(${val})">${displayVal}</button>`;
        });
    }

    function selectCountNumber(val) {
        if(document.getElementById(`opt-${val}`).disabled) return;
        selectedCountAns = val;
        let lang = currentLanguage();
        let dropBox = document.getElementById("drop-target-box");
        dropBox.innerText = (lang === 'mr') ? convertToMarathi(val) : val;
        dropBox.className = "target-drop-box filled";
        
        // सिलेक्ट केल्यावर साधा उच्चार
        if(lang === 'mr') {
            speakText(convertToMarathi(val), 'mr');
        } else {
            speakText(val.toString(), 'en');
        }
    }

    function checkCountAnswer() {
        let lang = currentLanguage();
        if(selectedCountAns === null) {
            if(lang === 'mr') alert("कृपया आधी एक अंक निवडा!");
            else alert("Please select a number first!");
            return;
        }
        
        let res = document.getElementById("result-message-count");
        let dropBox = document.getElementById("drop-target-box");
        
        if(selectedCountAns === correctCountAns) {
            res.innerText = (lang === 'mr') ? "✓ अप्रतिम! बरोबर उत्तर आहे. 🎉" : "✓ Excellent! Correct Answer. 🎉";
            res.className = "result correct";
            dropBox.className = "target-drop-box success-state";
            
            // 🎯 उत्तर बरोबर आल्यावर दशक-एकक सुट्ट्या करून बोलण्याची सिस्टीम
            let praise = (lang === 'mr') ? "शाब्बास! " : "Well Done! ";
            let numberSpeech = getTensUnitsSpeechText(correctCountAns, lang);
            speakText(praise + numberSpeech);

            if(!isReviewState) {
                scoreCount++;
                document.getElementById("score-board-count").innerText = "SCORE: " + ((lang === 'mr') ? convertToMarathi(scoreCount) : scoreCount);
            }
            disableAllOptions();
            setButtonState("next");
        } else {
            res.innerText = (lang === 'mr') ? "✗ चुकीचे उत्तर! पुन्हा प्रयत्न

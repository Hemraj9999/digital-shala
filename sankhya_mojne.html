<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>संख्या मोजणे खेळ (Pro)</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --panel-bg: #1e293b;
            --primary: #10b981;
            --primary-hover: #059669;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            user-select: none;
        }

        header {
            width: 100%;
            max-width: 450px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .back-btn {
            color: #10b981;
            text-decoration: none;
            background: rgba(16, 185, 129, 0.1);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .game-panel {
            background: rgba(30, 41, 59, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .score-box {
            background: #00f2fe;
            color: #0f172a;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 14px;
        }

        .lang-indicator {
            font-size: 13px;
            color: #94a3b8;
            font-weight: bold;
        }

        .setup-section {
            margin-bottom: 20px;
            text-align: left;
        }

        .setup-section label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: 600;
        }

        select {
            width: 100%;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            outline: none;
        }

        .instruction {
            color: #00f2fe;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        /* 🍎 चित्र प्रदर्शन पाटी */
        .display-board {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            min-height: 110px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        .item-emoji {
            font-size: 32px;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .target-slot {
            width: 65px;
            height: 65px;
            border: 2px dashed #10b981;
            background: rgba(16, 185, 129, 0.05);
            border-radius: 14px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: #10b981;
        }

        .target-slot.success {
            background: #10b981;
            color: #fff;
            border-style: solid;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        /* 🔢 पर्याय कीपॅड ग्रिड */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            height: 55px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .option-btn:active {
            background: #334155;
            transform: scale(0.95);
        }

        .next-btn {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .next-btn:active {
            background: var(--primary-hover);
        }

        .feedback-text {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 700;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <header>
        <a href="ganit.html" class="back-btn">⬅ मागे</a>
        <div style="font-size: 16px; font-weight: 800; color: #10b981;">🍎 संख्या मोजणे खेळ</div>
        <div style="width:50px;"></div>
    </header>

    <div class="game-panel">
        <div class="stats-bar">
            <div class="score-box" id="score-display">SCORE: ०</div>
            <div class="lang-indicator">🔊 मराठी आवाज एक्टिव्ह</div>
        </div>

        <div class="setup-section">
            <label>🎯 अभ्यासासाठी संख्या गट निवडा:</label>
            <select id="range-selector" onchange="initGame()">
                <option value="1-10">🔢 गट: १ ते १०</option>
                <option value="1-20">🔢 गट: १ ते २०</option>
            </select>
        </div>

        <div class="instruction">चित्रे मोजा आणि योग्य अंक निवडून बॉक्स भरा!</div>

        <div class="display-board" id="item-board"></div>

        <div class="target-slot" id="answer-slot">?</div>

        <div class="options-grid" id="options-box"></div>

        <button class="next-btn" onclick="initGame()">पुढचे उदाहरण ➡️</button>
        
        <div class="feedback-text" id="feedback"></div>
    </div>

<script>
    let currentCount = 0;
    let score = 0;
    const emojis = ['🍎', '⭐', '🎈', '🍉', '🐱', '🦋', '🚗', '🍦', '🥭', '🌻'];
    
    // मराठी अंकांचे मॅपिंग (कॉम्प्युटर आणि मोबाईल दोन्हीसाठी सुरक्षित)
    const marathiNumbers = {
        0:'०', 1:'१', 2:'२', 3:'३', 4:'४', 5:'५', 6:'६', 7:'७', 8:'८', 9:'९', 10:'१०',
        11:'११', 12:'१२', 13:'१३', 14:'१४', 15:'१५', 16:'१६', 17:'१७', 18:'१८', 19:'१९', 20:'२०'
    };

    // कॉम्प्युटरवर व्हॉईस लोड होण्यासाठी इव्हेंट रायडर
    let synth = window.speechSynthesis;
    let marathiVoice = null;

    function loadVoices() {
        if (!synth) return;
        let voices = synth.getVoices();
        // कॉम्प्युटर आणि मोबाईल सिस्टीम मधील सर्वोत्कृष्ट मराठी व्हॉईस शोधणे
        marathiVoice = voices.find(v => v.lang.includes('mr') || v.lang.includes('MR') || v.name.toLowerCase().includes('marathi'));
    }

    if (synth && synth.onvoiceschanged !== undefined) {
        synth.onvoiceschanged = loadVoices;
    }
    loadVoices();

    function initGame() {
        document.getElementById("answer-slot").innerText = "?";
        document.getElementById("answer-slot").className = "target-slot";
        document.getElementById("feedback").innerText = "";
        document.getElementById("feedback").style.color = "#fff";

        // रेंज ठरवणे
        let range = document.getElementById("range-selector").value;
        let max = range === "1-10" ? 10 : 20;
        currentCount = Math.floor(Math.random() * max) + 1;

        // १. बोर्डवर रँडम चित्रे रेंडर करणे
        let itemBoard = document.getElementById("item-board");
        itemBoard.innerHTML = "";
        let randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
        
        for(let i=0; i < currentCount; i++) {
            let span = document.createElement("span");
            span.className = "item-emoji";
            span.innerText = randomEmoji;
            itemBoard.appendChild(span);
        }

        // २. पर्यायांची रचना करणे (४ पर्याय)
        let options = [currentCount];
        while(options.length < 4) {
            let rand = Math.floor(Math.random() * max) + 1;
            if(!options.includes(rand)) options.push(rand);
        }
        options.sort(() => Math.random() - 0.5);

        // ३. पर्याय बटणे बनवणे
        let optionsBox = document.getElementById("options-box");
        optionsBox.innerHTML = "";
        options.forEach(num => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = marathiNumbers[num] || num;
            btn.onclick = () => checkAnswer(num);
            optionsBox.appendChild(btn);
        });
    }

    function checkAnswer(selectedNum) {
        let slot = document.getElementById("answer-slot");
        slot.innerText = marathiNumbers[currentCount] || currentCount;

        if(selectedNum === currentCount) {
            score++;
            document.getElementById("score-display").innerText = "SCORE: " + (marathiNumbers[score] || score);
            slot.className = "target-slot success";
            document.getElementById("feedback").innerText = "✔ बरोबर उत्तर आहे! 🎉";
            document.getElementById("feedback").style.color = "#10b981";
            speakMarathi(marathiNumbers[currentCount]);
        } else {
            slot.className = "target-slot";
            slot.style.borderColor = "#ff6b6b";
            slot.style.color = "#ff6b6b";
            document.getElementById("feedback").innerText = "❌ चुकीचे उत्तर! पुन्हा प्रयत्न करा.";
            document.getElementById("feedback").style.color = "#ff6b6b";
            speakMarathi("पुन्हा प्रयत्न करा");
        }
    }

    function speakMarathi(text) {
        if (!synth) return;
        synth.cancel(); // जुना आवाज थांबवणे
        
        let utter = new SpeechSynthesisUtterance(text);
        
        if (marathiVoice) {
            utter.voice = marathiVoice;
        } else {
            utter.lang = 'mr-IN'; // बॅकअप म्हणून मराठी कोड देणे
        }
        
        utter.rate = 0.85; // लहान मुलांसाठी स्पष्ट स्पीड
        synth.speak(utter);
    }

    window.onload = () => {
        loadVoices();
        initGame();
    };
</script>
</body>
</html>

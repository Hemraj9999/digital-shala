<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>संख्या मोजणे - Digital Shala Pro</title>
    <style>
        :root { 
            --primary: #ff9f43; 
            --primary-glow: rgba(255, 159, 67, 0.4); 
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b); 
            --card-bg: rgba(255, 255, 255, 0.06); 
            --card-border: rgba(255, 255, 255, 0.1); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-gradient); color: #f8fafc; min-height: 100vh; text-align: center; }
        
        header { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--card-border); padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { color: #94a3b8; text-decoration: none; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 30px; font-size: 14px; border: 1px solid var(--card-border); transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        header h2 { font-size: 20px; font-weight: 700; background: linear-gradient(90deg, #ff9f43, #ff5252); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .game-container { max-width: 550px; width: 92%; margin: 30px auto; background: var(--card-bg); padding: 30px 25px; border-radius: 24px; border: 1px solid var(--card-border); backdrop-filter: blur(12px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .score-board { font-size: 16px; font-weight: 700; background: #10b981; color: white; padding: 8px 18px; display: inline-block; border-radius: 30px; margin-bottom: 25px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        
        .lang-selector-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 16px; margin-bottom: 25px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.03); }
        .lang-label { font-size: 15px; font-weight: 600; color: #cbd5e1; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 10px; }
        .lang-label:has(input:checked) { background: rgba(255,255,255,0.08); color: var(--primary); }
        .lang-label input { transform: scale(1.2); accent-color: var(--primary); }

        .instruction-box { background: rgba(255, 159, 67, 0.08); padding: 14px; border-radius: 16px; border-left: 4px solid var(--primary); margin-bottom: 25px; text-align: left; }
        .inst-mr { font-size: 15px; font-weight: 600; color: #ffad5a; }
        
        .display-board-count { background: rgba(0,0,0,0.15); border: 2px dashed rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; font-size: 45px; letter-spacing: 12px; min-height: 120px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; margin-bottom: 25px; filter: drop-shadow(0 6px 10px rgba(0,0,0,0.3)); }
        
        .target-drop-box { width: 90px; height: 90px; border: 4px dashed var(--primary); border-radius: 20px; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 800; color: #fff; margin: 20px auto; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); transition: all 0.3s; }
        .target-drop-box.filled { border-style: solid; background: rgba(255, 159, 67, 0.1); border-color: #10b981; color: #10b981; }
        
        .target-drop-box.error-state { border-style: solid; border-color: #ef4444 !important; color: #ef4444 !important; background: rgba(239, 68, 68, 0.15) !important; animation: shake 0.4s ease-in-out; }
        .target-drop-box.success-state { border-style: solid; border-color: #10b981 !important; color: #10b981 !important; background: rgba(16, 185, 129, 0.2) !important; transform: scale(1.1); }
        
        .options-flex { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .opt-btn { background: #1e293b; border: 2px solid var(--card-border); border-radius: 16px; width: 75px; height: 75px; font-size: 32px; font-weight: 800; color: #fff; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .opt-btn:hover { border-color: var(--primary); transform: translateY(-3px); background: rgba(255,255,255,0.05); }
        .opt-btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--card-border) !important; transform: none !important; }
        
        .submit-btn { font-size: 18px; background: linear-gradient(135deg, #ff9f43, #ff5252); color: white; border: none; padding: 16px 35px; border-radius: 16px; cursor: pointer; font-weight: 700; margin-top: 20px; width: 100%; box-shadow: 0 6px 20px var(--primary-glow); transition: all 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 159, 67, 0.5); }
        
        .result { font-size: 22px; font-weight: 700; margin-top: 20px; min-height: 40px; }
        .correct { color: #34d399; text-shadow: 0 0 10px rgba(52, 211, 153, 0.3); }
        .wrong { color: #f87171; text-shadow: 0 0 10px rgba(248, 113, 113, 0.3); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body onclick="initAudioContext()"> <header>
    <a href="ganit.html" class="back-btn">⬅ मागे जा</a>
    <h2>✨ संख्या मोजणे खेळ (Pro)</h2>
    <div style="width:85px;"></div>
</header>

<div class="game-container">
    <div class="lang-selector-box">
        <span style="font-size: 14px; font-weight: 600; color: #64748b;">🗣️ LANGUAGE:</span>
        <label class="lang-label"><input type="radio" name="lang-select" value="mr" checked onchange="updateLanguageUI()"> 🚩 मराठी</label>
        <label class="lang-label"><input type="radio" name="lang-select" value="en" onchange="updateLanguageUI()"> 🔤 English</label>
    </div>

    <div style="text-align: center;"><div class="score-board" id="score-board-count">SCORE: ०</div></div>
    <div class="instruction-box"><div class="inst-mr" id="instruction-text">चित्रे मोजा आणि योग्य अंक निवडून बॉक्स भरा!</div></div>
    
    <div class="display-board-count" id="count-image-board">🎈🎈🎈</div>
    <span style="font-size:14px; font-weight:600; color:#94a3b8;" id="selected-label">निवडलेला अंक:</span>
    
    <div class="target-drop-box" id="drop-target-box">?</div>
    <div class="options-flex" id="count-options-container"></div>
    
    <button id="action-btn-count" class="submit-btn" onclick="checkCountAnswer()">उत्तर तपासा</button>
    <div class="result" id="result-message-count"></div>
</div>

<script>
    let scoreCount = 0, correctCountAns = 0, selectedCountAns = null;
    let lastNumber = 0; 
    let isReviewState = false; 
    let audioCtx = null; // ऑडिओ कॉन्टेक्स्ट सुरक्षित ठेवण्यासाठी
    
    const originalDesigns = ["🎈", "⭐", "🍎", "⚽", "🌸", "🍦", "🍭", "🍩", "🚗", "🐱", "🦁", "🦖"];
    let availableDesigns = [...originalDesigns];
    const marathiDigits = {'0':'०','1':'१','2':'२','3':'३','4':'४','5':'५','6':'६','7':'७','8':'८','9':'९'};

    // युझरच्या पहिल्या टचवर ऑडिओ ॲक्टिव्हेट करणे
    function initAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function convertToMarathi(number) {
        return number.toString().split('').map(digit => marathiDigits[digit] || digit).join('');
    }

    function currentLanguage() {
        return document.querySelector('input[name="lang-select"]:checked').value;
    }

    function updateLanguageUI() {
        let lang = currentLanguage();
        let btn = document.getElementById("action-btn-count");
        
        if(lang === 'mr') {
            document.getElementById("instruction-text").innerText = "चित्रे मोजा आणि योग्य अंक निवडून बॉक्स भरा!";
            document.getElementById("selected-label").innerText = "निवडलेला अंक:";
            document.getElementById("score-board-count").innerText = "SCORE: " + convertToMarathi(scoreCount);
            
            if(btn.getAttribute("data-state") === "next") btn.innerText = "पुढचे उदाहरण";
            else if(btn.getAttribute("data-state") === "retry") btn.innerText = "पुन्हा प्रयत्न करा 🔄";
            else btn.innerText = "उत्तर तपासा";
        } else {
            document.getElementById("instruction-text").innerText = "Count the pictures and select the correct number!";
            document.getElementById("selected-label").innerText = "Selected Number:";
            document.getElementById("score-board-count").innerText = "SCORE: " + scoreCount;
            
            if(btn.getAttribute("data-state") === "next") btn.innerText = "Next Question";
            else if(btn.getAttribute("data-state") === "retry") btn.innerText = "Try Again 🔄";
            else btn.innerText = "Check Answer";
        }
        if(selectedCountAns !== null) {
            document.getElementById("drop-target-box").innerText = (lang === 'mr') ? convertToMarathi(selectedCountAns) : selectedCountAns;
        }
        renderOptions();
    }

    let generatedOptions = []; 

    function generateCountQuestion() {
        let lang = currentLanguage();
        selectedCountAns = null;
        isReviewState = false;
        
        let newNumber;
        do {
            newNumber = Math.floor(Math.random() * 9) + 1;
        } while (newNumber === lastNumber);
        correctCountAns = newNumber;
        lastNumber = correctCountAns;

        if (availableDesigns.length === 0) {
            availableDesigns = [...originalDesigns];
        }
        let randomIndex = Math.floor(Math.random() * availableDesigns.length);
        let icon = availableDesigns.splice(randomIndex, 1)[0]; 

        document.getElementById("count-image-board").innerText = icon.repeat(correctCountAns);
        
        resetDropBox();
        document.getElementById("result-message-count").innerText = "";
        
        let optionsSet = new Set();
        optionsSet.add(correctCountAns);
        while(optionsSet.size < 4) {
            optionsSet.add(Math.floor(Math.random() * 9) + 1);
        }
        generatedOptions = Array.from(optionsSet).sort(() => Math.random() - 0.5);

        renderOptions();
        setButtonState("check");
    }

    function resetDropBox() {
        let dropBox = document.getElementById("drop-target-box");
        dropBox.innerText = "?";
        dropBox.className = "target-drop-box";
    }

    function renderOptions() {
        let lang = currentLanguage();
        let optContainer = document.getElementById("count-options-container");
        optContainer.innerHTML = "";
        
        generatedOptions.forEach(val => {
            let displayVal = (lang === 'mr') ? convertToMarathi(val) : val;
            optContainer.innerHTML += `<button class="opt-btn" id="opt-${val}" onclick="selectCountNumber(${val})">${displayVal}</button>`;
        });
    }

    function selectCountNumber(val) {
        // जर आधी चुकीचे उत्तर देऊन बटण डिसेबल केले असेल, तर क्लिक करू देऊ नका
        if(document.getElementById(`opt-${val}`).disabled) return;

        selectedCountAns = val;
        let lang = currentLanguage();
        let dropBox = document.getElementById("drop-target-box");
        
        dropBox.innerText = (lang === 'mr') ? convertToMarathi(val) : val;
        dropBox.className = "target-drop-box filled";
        
        speakText(val);
    }

    function playSuccessSound() {
        initAudioContext();
        if (!audioCtx) return;
        
        let playNote = (freq, start, duration) => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(0.15, start);
            gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(start);
            osc.stop(start + duration);
        };
        playNote(523.25, audioCtx.currentTime, 0.15); 
        playNote(659.25, audioCtx.currentTime + 0.12, 0.3); 
    }

    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = (currentLanguage() === 'mr') ? 'mr-IN' : 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
    }

    function checkCountAnswer() {
        let lang = currentLanguage();
        if(selectedCountAns === null) {
            if(lang === 'mr') alert("कृपया आधी एक अंक निवडा!");
            else alert("Please select a number first!");
            return;
        }
        
        let res = document.getElementById("result-message-count");
        let dropBox = document.getElementById("drop-target-box");
        
        if(selectedCountAns === correctCountAns) {
            res.innerText = (lang === 'mr') ? "✓ अप्रतिम! बरोबर उत्तर आहे. 🎉" : "✓ Excellent! Correct Answer. 🎉";
            res.className = "result correct";
            dropBox.className = "target-drop-box success-state";
            
            playSuccessSound();

            if(!isReviewState) {
                scoreCount++;
                document.getElementById("score-board-count").innerText = "SCORE: " + ((lang === 'mr') ? convertToMarathi(scoreCount) : scoreCount);
            }
            
            disableAllOptions();
            setButtonState("next");
        } else {
            res.innerText = (lang === 'mr') ? "✗ चुकीचे उत्तर! पुन्हा प्रयत्न करा." : "✗ Wrong Answer! Try again.";
            res.className = "result wrong";
            dropBox.className = "target-drop-box error-state";
            
            document.getElementById(`opt-${selectedCountAns}`).disabled = true;
            isReviewState = true; 
            setButtonState("retry");

            setTimeout(() => {
                let msg = (lang === 'mr') ? "पुन्हा प्रयत्न करा" : "Try again";
                speakText(msg);
            }, 250);
        }
    }

    function retryCurrentQuestion() {
        selectedCountAns = null;
        resetDropBox();
        document.getElementById("result-message-count").innerText = "";
        
        // चुकीचे उत्तर दिलेले बटण सोडून बाकीचे पर्याय पुन्हा व्यवस्थित ॲक्टिव्ह ठेवणे
        generatedOptions.forEach(val => {
            let btn = document.getElementById(`opt-${val}`);
            if(btn && btn.getAttribute("disabled") === null) {
                btn.disabled = false;
            }
        });

        setButtonState("check");
    }

    function disableAllOptions() {
        let btns = document.querySelectorAll(".opt-btn");
        btns.forEach(b => b.disabled = true);
    }

    function enableAllOptions() {
        let btns = document.querySelectorAll(".opt-btn");
        btns.forEach(b => b.disabled = false);
    }

    function setButtonState(state) {
        let lang = currentLanguage();
        let btn = document.getElementById("action-btn-count");
        btn.setAttribute("data-state", state);
        
        if(state === "check") {
            btn.innerText = (lang === 'mr') ? "उत्तर तपासा" : "Check Answer";
            btn.setAttribute("onclick", "checkCountAnswer()");
        } else if(state === "retry") {
            btn.innerText = (lang === 'mr') ? "पुन्हा प्रयत्न करा 🔄" : "Try Again 🔄";
            btn.setAttribute("onclick", "retryCurrentQuestion()");
        } else if(state === "next") {
            btn.innerText = (lang === 'mr') ? "पुढचे उदाहरण" : "Next Question";
            btn.setAttribute("onclick", "generateCountQuestion()");
        }
    }

    window.onload = function() {
        generateCountQuestion();
    };
</script>
</body>
</html>

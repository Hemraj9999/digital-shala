<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>संख्या मोजणे - Digital Shala Pro</title>
    <style>
        :root { 
            --primary: #00f2fe; 
            --secondary: #4facfe;
            --success: #00e676;
            --error: #ff1744;
            --neon-glow: rgba(0, 242, 254, 0.4); 
            --bg-gradient: linear-gradient(135deg, #050b14, #101f32, #0a1128); 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-gradient); 
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto; /* पूर्ण स्क्रीन स्क्रोल होऊ देईल */
            padding-bottom: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        header { 
            background: rgba(10, 20, 38, 0.6); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--glass-border); 
            padding: 8px 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            height: 50px;
        }
        
        .back-btn { 
            color: #00f2fe; 
            text-decoration: none; 
            background: rgba(0, 242, 254, 0.05); 
            padding: 5px 12px; 
            border-radius: 30px; 
            font-size: 12px; 
            font-weight: 600;
            border: 1px solid rgba(0, 242, 254, 0.2); 
        }
        
        header h2 { 
            font-size: 14px; 
            font-weight: 800; 
            background: linear-gradient(90deg, #00f2fe, #4facfe); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .game-outer-wrapper {
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .game-container { 
            max-width: 420px; 
            width: 100%; 
            background: var(--glass); 
            padding: 14px; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(20px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-board { 
            font-size: 12px; 
            font-weight: 800; 
            background: linear-gradient(135deg, #00e676, #00b0ff); 
            color: white; 
            padding: 4px 10px; 
            border-radius: 20px; 
        }
        
        .lang-selector-box { 
            background: rgba(0,0,0,0.3); 
            padding: 2px 4px; 
            border-radius: 20px; 
            display: flex; 
            border: 1px solid var(--glass-border);
        }
        .lang-label { 
            font-size: 11px; 
            font-weight: 600; 
            color: #94a3b8; 
            cursor: pointer; 
            padding: 3px 8px; 
            border-radius: 15px; 
        }
        .lang-label input { display: none; }
        .lang-label:has(input:checked) { 
            background: rgba(0, 242, 254, 0.15); 
            color: #00f2fe; 
        }

        .voice-selector-container {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .voice-label { font-size: 11px; font-weight: 600; color: #94a3b8; }
        .voice-select {
            background: #101f32;
            color: #00f2fe;
            border: 1px solid rgba(0, 242, 254, 0.2);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            outline: none;
            width: 60%;
        }

        .instruction-box { 
            background: rgba(0, 242, 254, 0.02); 
            padding: 6px 10px; 
            border-radius: 10px; 
            border-left: 3px solid #00f2fe; 
        }
        .inst-mr { font-size: 11px; font-weight: 600; color: #00f2fe; }
        
        .display-board-count { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 16px; 
            padding: 10px; 
            font-size: 28px; 
            min-height: 70px; 
            max-height: 100px;
            overflow-y: auto;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 6px;
        }
        
        .target-drop-box { 
            width: 60px; 
            height: 60px; 
            border: 2px dashed #00f2fe; 
            border-radius: 12px; 
            background: rgba(0, 242, 254, 0.02); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 26px; 
            font-weight: 900; 
            color: #fff; 
            margin: 2px auto; 
        }
        .target-drop-box.filled { 
            border-style: solid; 
            background: rgba(0, 242, 254, 0.1); 
            border-color: #00f2fe; 
            color: #00f2fe; 
        }
        
        .target-drop-box.error-state { border-color: var(--error) !important; color: var(--error) !important; animation: shake 0.4s ease-in-out; }
        .target-drop-box.success-state { border-color: var(--success) !important; color: var(--success) !important; }
        
        /* ऑप्शन्सची जागा २x२ ग्रीड किंवा व्यवस्थित रॅपिंग मध्ये सेट केली */
        .options-flex { 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 12px; 
            margin: 10px 0;
            width: 100%;
        }
        .opt-btn { 
            background: rgba(16, 31, 50, 0.9); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 12px; 
            width: 55px; 
            height: 55px; 
            font-size: 24px; 
            font-weight: 800; 
            color: #f8fafc; 
            cursor: pointer; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .opt-btn:hover { border-color: #00f2fe; color: #00f2fe; }
        .opt-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .submit-btn { 
            font-size: 14px; 
            background: linear-gradient(135deg, #00f2fe, #4facfe); 
            color: #050b14; 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 800; 
            width: 100%; 
            text-transform: uppercase;
        }
        
        .result { font-size: 14px; font-weight: 700; min-height: 20px; text-align: center; }
        .correct { color: #00e676; }
        .wrong { color: #ff1744; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

<header>
    <a href="ganit.html" class="back-btn">⬅ मागे जा</a>
    <h2>✨ संख्या मोजणे खेळ (Pro)</h2>
    <div style="width:60px;"></div>
</header>

<div class="game-outer-wrapper">
    <div class="game-container">
        <div class="top-row">
            <div class="score-board" id="score-board-count">SCORE: ०</div>
            <div class="lang-selector-box">
                <label class="lang-label"><input type="radio" name="lang-select" value="mr" checked onchange="updateLanguageUI()">🚩 मराठी</label>
                <label class="lang-label"><input type="radio" name="lang-select" value="en" onchange="updateLanguageUI()">🔤 EN</label>
            </div>
        </div>

        <div class="voice-selector-container">
            <span class="voice-label">🗣️ <span id="voice-label-text">आवाज निवडा:</span></span>
            <select id="voice-select-dropdown" class="voice-select">
                <option value="default">सिस्टीम आवाज (Default)</option>
            </select>
        </div>

        <div class="instruction-box">
            <div class="inst-mr" id="instruction-text">चित्रे मोजा आणि योग्य अंक निवडून बॉक्स भरा!</div>
        </div>
        
        <div class="display-board-count" id="count-image-board">🎈🎈🎈</div>
        
        <div class="target-drop-box" id="drop-target-box">?</div>
        
        <div class="options-flex" id="count-options-container"></div>
        
        <button id="action-btn-count" class="submit-btn" onclick="checkCountAnswer()">उत्तर तपासा</button>
        <div class="result" id="result-message-count"></div>
    </div>
</div>

<script>
    let scoreCount = 0, correctCountAns = 0, selectedCountAns = null;
    let lastNumber = 0; 
    let isReviewState = false; 
    let sysVoices = [];
    let generatedOptions = []; 
    
    const originalDesigns = ["🎈", "⭐", "🍎", "⚽", "🌸", "🍦", "🍭", "🍩", "🚗", "🐱", "🦁", "🦖"];
    let availableDesigns = [...originalDesigns];
    const marathiDigits = {'0':'०','1':'१','2':'२','3':'३','4':'४','5':'५','6':'६','7':'७','8':'८','9':'९'};

    function convertToMarathi(number) {
        return number.toString().split('').map(digit => marathiDigits[digit] || digit).join('');
    }

    function currentLanguage() {
        return document.querySelector('input[name="lang-select"]:checked').value;
    }

    function loadAvailableVoices() {
        if (!('speechSynthesis' in window)) return;
        
        sysVoices = window.speechSynthesis.getVoices();
        let dropdown = document.getElementById("voice-select-dropdown");
        if(!dropdown) return;
        
        dropdown.innerHTML = "";
        let defaultOpt = document.createElement("option");
        defaultOpt.value = "default";
        defaultOpt.textContent = currentLanguage() === 'mr' ? "सिस्टीम आवाज (Default)" : "System Default";
        dropdown.appendChild(defaultOpt);
        
        let currentLangCode = currentLanguage() === 'mr' ? 'mr' : 'en';
        let filteredVoices = sysVoices.filter(v => v.lang.startsWith(currentLangCode));
        
        if(filteredVoices.length === 0 && sysVoices.length > 0) {
            filteredVoices = sysVoices;
        }

        filteredVoices.forEach((voice) => {
            let option = document.createElement("option");
            option.value = voice.name;
            let gender = voice.name.toLowerCase().includes('female') ? 'स्त्री' : 'पुरुष/सामान्य';
            if(currentLanguage() === 'en') gender = voice.name.toLowerCase().includes('female') ? 'Female' : 'Male/Default';
            option.textContent = `${gender} (${voice.name.split(' ')[0]})`;
            dropdown.appendChild(option);
        });
    }

    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = loadAvailableVoices;
        loadAvailableVoices();
    }

    function updateLanguageUI() {
        let lang = currentLanguage();
        let btn = document.getElementById("action-btn-count");
        
        if(lang === 'mr') {
            document.getElementById("instruction-text").innerText = "चित्रे मोजा आणि योग्य अंक निवडून बॉक्स भरा!";
            document.getElementById("voice-label-text").innerText = "आवाज निवडा:";
            document.getElementById("score-board-count").innerText = "SCORE: " + convertToMarathi(scoreCount);
            if(btn.getAttribute("data-state") === "next") btn.innerText = "पुढचे उदाहरण";
            else if(btn.getAttribute("data-state") === "retry") btn.innerText = "पुन्हा प्रयत्न करा 🔄";
            else btn.innerText = "उत्तर तपासा";
        } else {
            document.getElementById("instruction-text").innerText = "Count the pictures and select the correct number!";
            document.getElementById("voice-label-text").innerText = "Select Voice:";
            document.getElementById("score-board-count").innerText = "SCORE: " + scoreCount;
            if(btn.getAttribute("data-state") === "next") btn.innerText = "Next Question";
            else if(btn.getAttribute("data-state") === "retry") btn.innerText = "Try Again 🔄";
            else btn.innerText = "Check Answer";
        }
        if(selectedCountAns !== null) {
            document.getElementById("drop-target-box").innerText = (lang === 'mr') ? convertToMarathi(selectedCountAns) : selectedCountAns;
        }
        loadAvailableVoices();
        renderOptions();
    }

    function generateCountQuestion() {
        let lang = currentLanguage();
        selectedCountAns = null;
        isReviewState = false;
        
        let newNumber;
        do {
            newNumber = Math.floor(Math.random() * 9) + 1;
        } while (newNumber === lastNumber);
        correctCountAns = newNumber;
        lastNumber = correctCountAns;

        if (availableDesigns.length === 0) {
            availableDesigns = [...originalDesigns];
        }
        let randomIndex = Math.floor(Math.random() * availableDesigns.length);
        let icon = availableDesigns.splice(randomIndex, 1)[0]; 

        document.getElementById("count-image-board").innerText = icon.repeat(correctCountAns);
        resetDropBox();
        document.getElementById("result-message-count").innerText = "";
        
        let optionsSet = new Set();
        optionsSet.add(correctCountAns);
        while(optionsSet.size < 4) {
            optionsSet.add(Math.floor(Math.random() * 9) + 1);
        }
        generatedOptions = Array.from(optionsSet).sort(() => Math.random() - 0.5);

        renderOptions();
        setButtonState("check");
    }

    function resetDropBox() {
        let dropBox = document.getElementById("drop-target-box");
        dropBox.innerText = "?";
        dropBox.className = "target-drop-box";
    }

    function renderOptions() {
        let lang = currentLanguage();
        let optContainer = document.getElementById("count-options-container");
        if(!optContainer) return;
        optContainer.innerHTML = "";
        
        generatedOptions.forEach(val => {
            let displayVal = (lang === 'mr') ? convertToMarathi(val) : val;
            optContainer.innerHTML += `<button class="opt-btn" id="opt-${val}" onclick="selectCountNumber(${val})">${displayVal}</button>`;
        });
    }

    function selectCountNumber(val) {
        if(document.getElementById(`opt-${val}`).disabled) return;
        selectedCountAns = val;
        let lang = currentLanguage();
        let dropBox = document.getElementById("drop-target-box");
        dropBox.innerText = (lang === 'mr') ? convertToMarathi(val) : val;
        dropBox.className = "target-drop-box filled";
        speakText(val);
    }

    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let utterance = new SpeechSynthesisUtterance(text);
            let dropdown = document.getElementById("voice-select-dropdown");
            let selectedVoiceName = dropdown ? dropdown.value : "default";
            
            if(selectedVoiceName !== "default") {
                let matchedVoice = sysVoices.find(v => v.name === selectedVoiceName);
                if (matchedVoice) utterance.voice = matchedVoice;
            } else {
                utterance.lang = (currentLanguage() === 'mr') ? 'mr-IN' : 'en-US';
            }
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
    }

    function checkCountAnswer() {
        let lang = currentLanguage();
        if(selectedCountAns === null) {
            if(lang === 'mr') alert("कृपया आधी एक अंक निवडा!");
            else alert("Please select a number first!");
            return;
        }
        
        let res = document.getElementById("result-message-count");
        let dropBox = document.getElementById("drop-target-box");
        
        if(selectedCountAns === correctCountAns) {
            res.innerText = (lang === 'mr') ? "✓ अप्रतिम! बरोबर उत्तर आहे. 🎉" : "✓ Excellent! Correct Answer. 🎉";
            res.className = "result correct";
            dropBox.className = "target-drop-box success-state";
            speakText((lang === 'mr') ? "शाब्बास! बरोबर उत्तर आहे" : "Excellent! Correct Answer");

            if(!isReviewState) {
                scoreCount++;
                document.getElementById("score-board-count").innerText = "SCORE: " + ((lang === 'mr') ? convertToMarathi(scoreCount) : scoreCount);
            }
            disableAllOptions();
            setButtonState("next");
        } else {
            res.innerText = (lang === 'mr') ? "✗ चुकीचे उत्तर! पुन्हा प्रयत्न करा." : "✗ Wrong Answer! Try again.";
            res.className = "result wrong";
            dropBox.className = "target-drop-box error-state";
            
            let wrongBtn = document.getElementById(`opt-${selectedCountAns}`);
            if(wrongBtn) wrongBtn.disabled = true;
            isReviewState = true; 
            setButtonState("retry");
            setTimeout(() => { speakText((lang === 'mr') ? "पुन्हा प्रयत्न करा" : "Try again"); }, 50);
        }
    }

    function retryCurrentQuestion() {
        selectedCountAns = null;
        resetDropBox();
        document.getElementById("result-message-count").innerText = "";
        generatedOptions.forEach(val => {
            let btn = document.getElementById(`opt-${val}`);
            if(btn) btn.disabled = false;
        });
        setButtonState("check");
    }

    function disableAllOptions() {
        let btns = document.querySelectorAll(".opt-btn");
        btns.forEach(b => b.disabled = true);
    }

    function setButtonState(state) {
        let lang = currentLanguage();
        let btn = document.getElementById("action-btn-count");
        btn.setAttribute("data-state", state);
        
        if(state === "check") {
            btn.innerText = (lang === 'mr') ? "उत्तर तपासा" : "Check Answer";
            btn.setAttribute("onclick", "checkCountAnswer()");
        } else if(state === "retry") {
            btn.innerText = (lang === 'mr') ? "पुन्हा प्रयत्न करा 🔄" : "Try Again 🔄";
            btn.setAttribute("onclick", "retryCurrentQuestion()");
        } else if(state === "next") {
            btn.innerText = (lang === 'mr') ? "पुढचे उदाहरण" : "Next Question";
            btn.setAttribute("onclick", "generateCountQuestion()");
        }
    }

    window.onload = function() {
        loadAvailableVoices();
        setTimeout(loadAvailableVoices, 500);
        setTimeout(loadAvailableVoices, 1500);
        generateCountQuestion();
    };
</script>
</body>
</html>

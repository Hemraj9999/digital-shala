<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अंक ओळख खेळ / Number Recognition Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-sizing: border-box;
        }
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        .lang-btn {
            background-color: #e2e8f0;
            border: none;
            padding: 8px 16px;
            margin-left: 5px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .lang-btn.active {
            background-color: #ff7e5f;
            color: white;
        }
        .score-board {
            font-size: 20px;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 15px;
        }
        .instruction-box {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2d3748;
            min-height: 40px;
        }
        .speaker-btn {
            background: #4f46e5;
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.4);
            margin-bottom: 25px;
            transition: transform 0.2s;
        }
        .speaker-btn:active {
            transform: scale(0.95);
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .option-btn {
            background-color: #f8fafc;
            border: 3px solid #cbd5e1;
            border-radius: 15px;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: #1e293b;
        }
        .option-btn:hover {
            background-color: #f1f5f9;
            border-color: #94a3b8;
        }
        .feedback {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 30px;
        }
        .next-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            display: none;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="lang-switch">
        <button id="btn-mr" class="lang-btn active" onclick="switchLanguage('mr')">मराठी</button>
        <button id="btn-en" class="lang-btn" onclick="switchLanguage('en')">English</button>
    </div>

    <div id="score-view" class="score-board">SCORE: 0</div>
    <div id="instruction-text" class="instruction-box">अंक ऐकण्यासाठी खालील बटनावर क्लिक करा:</div>
    <div id="slot-view" style="font-size: 24px; font-weight: bold; margin-bottom: 15px; color: #4f46e5;"></div>

    <button class="speaker-btn" onclick="playTargetSound()">🔊</button>

    <div class="options-grid">
        <button class="option-btn" onclick="checkAnswer(this.innerText)"></button>
        <button class="option-btn" onclick="checkAnswer(this.innerText)"></button>
        <button class="option-btn" onclick="checkAnswer(this.innerText)"></button>
        <button class="option-btn" onclick="checkAnswer(this.innerText)"></button>
    </div>

    <div id="feedback-view" class="feedback"></div>
    <button id="next-question-btn" class="next-btn" onclick="nextQuestion()">पुढील प्रश्न ➔</button>
</div>

<audio id="game-audio" style="display:none;"></audio>
<script>
    // १ ते १० अंकांचे ऑडिओ ट्रॅक आणि अक्षरी रूप
    const numberSounds = {
        1: { mr: "https://dict.leo.org/audio/v2/Tz49nvdvW9fW69m4OU0WfQ.mp3", en: "https://upload.wikimedia.org/wikipedia/commons/2/25/En-us-one.ogg", mrChar: "एक", enChar: "One" },
        2: { mr: "https://dict.leo.org/audio/v2/LkgknvdvW9fW69m4OU0WfQ.mp3", en: "https://upload.wikimedia.org/wikipedia/commons/f/f3/En-us-two.ogg", mrChar: "दोन", enChar: "Two" },
        3: { mr: "https://dict.leo.org/audio/v2/T2P9nvdvW9fW69m4OU0WfQ.mp3", en: "https://upload.wikimedia.org/wikipedia/commons/e/e0/En-us-three.ogg", mrChar: "तीन", enChar: "Three" },
        4: { mr: "https://dict.leo.org/audio/v2/n5ygnvdvW9fW69m4OU0WfQ.mp3", en: "https://upload.wikimedia.org/wikipedia/commons/7/75/En-us-four.ogg", mrChar: "चार", enChar: "Four" },
        5: { mr: "https://dict.leo.org/audio/v2/9qHdnvdvW9fW69m4OU0WfQ.mp3", en: "https://upload.wikimedia.org/wikipedia/commons/0/02/En-us-five.ogg", mrChar: "पाच", enChar: "Five" },
        6: { mr: "https://dict.leo.org/audio/v2/vAednvdvW9fW69m4OU0WfQ.mp3", en: "https://upload.wikimedia.org/wikipedia/commons/2/28/En-us-six.ogg", mrChar: "सहा", enChar: "Six" },
        7: { mr: "https://dict.leo.org/audio/v2/g56dnvdvW9fW69m4OU0WfQ.mp3", en: "https://upload.wikimedia.org/wikipedia/commons/6/66/En-us-seven.ogg", mrChar: "सात", enChar: "Seven" },
        8: { mr: "https://dict.leo.org/audio/v2/yACdnvdvW9fW69m4OU0WfQ.mp3", en: "https://upload.wikimedia.org/wikipedia/commons/d/df/En-us-eight.ogg", mrChar: "आठ", enChar: "Eight" },
        9: { mr: "https://dict.leo.org/audio/v2/mDOgnvdvW9fW69m4OU0WfQ.mp3", en: "https://upload.wikimedia.org/wikipedia/commons/6/6f/En-us-nine.ogg", mrChar: "नऊ", enChar: "Nine" },
        10: { mr: "https://dict.leo.org/audio/v2/mDognvdvW9fW69m4OU0WfQ.mp3", en: "https://upload.wikimedia.org/wikipedia/commons/a/a9/En-us-ten.ogg", mrChar: "दहा", enChar: "Ten" }
    };

    let currentLang = 'mr'; 
    let score = 0;
    let targetNumber = null;

    // खेळ सुरू करणे
    nextQuestion();

    // भाषा बदलणे
    function switchLanguage(lang) {
        currentLang = lang;
        document.getElementById("btn-mr").classList.toggle("active", lang === 'mr');
        document.getElementById("btn-en").classList.toggle("active", lang === 'en');
        
        if(lang === 'mr') {
            document.getElementById("instruction-text").innerText = "अंक ऐकण्यासाठी खालील बटनावर क्लिक करा:";
            document.getElementById("next-question-btn").innerText = "पुढील प्रश्न ➔";
        } else {
            document.getElementById("instruction-text").innerText = "Click the button below to listen to the number:";
            document.getElementById("next-question-btn").innerText = "Next Question ➔";
        }
        nextQuestion();
    }

    // नवीन प्रश्न तयार करणे
    function nextQuestion() {
        document.getElementById("feedback-view").innerText = "";
        document.getElementById("slot-view").innerText = "";
        document.getElementById("next-question-btn").style.display = "none";
        
        targetNumber = Math.floor(Math.random() * 10) + 1;
        
        let choices = [targetNumber];
        while(choices.length < 4) {
            let rand = Math.floor(Math.random() * 10) + 1;
            if(!choices.includes(rand)) choices.push(rand);
        }
        
        choices.sort(() => Math.random() - 0.5);
        
        let btns = document.querySelectorAll(".option-btn");
        btns.forEach((btn, idx) => {
            btn.innerText = choices[idx];
            btn.disabled = false;
        });

        setTimeout(() => { playTargetSound(); }, 400);
    }

    // मुख्य प्रश्न अंक वाजवणे
    function playTargetSound() {
        let audioEl = document.getElementById("game-audio");
        if(audioEl && targetNumber) {
            audioEl.src = numberSounds[targetNumber][currentLang];
            audioEl.play().catch(e => console.log("Audio play blocked"));
        }
    }

    // क्लिक केलेल्या अंकाचा आवाज
    function playSoundFile(num) {
        let audioEl = document.getElementById("game-audio");
        if(audioEl && numberSounds[num]) {
            audioEl.src = numberSounds[num][currentLang];
            audioEl.play().catch(e => console.log("Audio play blocked"));
        }
    }

    // उत्तर तपासणे आणि स्वतंत्र आवाज देणे
    function checkAnswer(chosenNum) {
        let numericChosen = parseInt(chosenNum);
        playSoundFile(numericChosen);
        
        setTimeout(() => {
            let audioEl = document.getElementById("game-audio");
            let btns = document.querySelectorAll(".option-btn");
            btns.forEach(btn => btn.disabled = true);
            
            if(numericChosen === targetNumber) {
                score++; 
                document.getElementById("score-view").innerText = "SCORE: " + score;
                document.getElementById("slot-view").innerText = currentLang === 'mr' ? numberSounds[targetNumber].mrChar : numberSounds[targetNumber].enChar;
                document.getElementById("feedback-view").style.color = "#10b981";
                document.getElementById("feedback-view").innerText = currentLang === 'mr' ? "✓ बरोबर उत्तर आहे! 🎉" : "✓ Correct Answer! 🎉";
                document.getElementById("next-question-btn").style.display = "block";
                
                // --- बरोबर उत्तराचा भाषेनुसार वेगळा आवाज ---
                if(audioEl) {
                    audioEl.src = currentLang === 'mr' 
                        ? "https://dict.leo.org/audio/v2/r4mZ8vdvW9fW69m4OU0WfQ.mp3" // मराठीसाठी "बरोबर" ट्यून
                        : "https://upload.wikimedia.org/wikipedia/commons/b/bc/En-us-correct.ogg"; // इंग्रजीसाठी "Correct" उच्चार
                    audioEl.play().catch(e => console.log("Audio play blocked"));
                }
            } else {
                document.getElementById("feedback-view").style.color = "#ef4444";
                document.getElementById("feedback-view").innerText = currentLang === 'mr' ? "✗ चुकीचे उत्तर, पुन्हा प्रयत्न करा! 🙁" : "✗ Wrong answer, try again! 🙁";
                
                btns.forEach(btn => btn.disabled = false);

                // --- चुकीच्या उत्तराचा भाषेनुसार वेगळा आवाज ---
                if(audioEl) {
                    audioEl.src = currentLang === 'mr' 
                        ? "https://dict.leo.org/audio/v2/dYK5nvdvW9fW69m4OU0WfQ.mp3" // मराठीसाठी चुकीचा ट्यून
                        : "https://upload.wikimedia.org/wikipedia/commons/e/ec/En-us-wrong.ogg"; // इंग्रजीसाठी "Wrong" उच्चार
                    audioEl.play().catch(e => console.log("Audio play blocked"));
                }
            }
        }, 800);
    }
</script>
</body>
</html>

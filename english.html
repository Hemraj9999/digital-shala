<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Phonics Shala</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --panel-bg: #1e293b;
            --primary: #00f2fe;
            --btn-active: #2563eb;
            --game-pink: #ec4899;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            user-select: none;
        }

        header {
            width: 100%;
            max-width: 420px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .back-btn {
            color: #00f2fe;
            text-decoration: none;
            background: rgba(0, 242, 254, 0.1);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }

        /* 🎮 नवीन खेळ निवडण्यासाठी मेनू बटण */
        .game-link-box {
            width: 100%;
            max-width: 420px;
            margin-bottom: 15px;
            text-align: center;
        }

        .game-menu-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            color: white;
            text-decoration: none;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* 🔠 कॅपिटल / स्मॉल स्विच */
        .mode-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 420px;
            margin-bottom: 15px;
            background: #0f172a;
            padding: 4px;
            border-radius: 14px;
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 10px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #2563eb;
            color: #fff;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        /* 📋 ४ लाईन पाटी */
        .display-card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            height: 220px;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 4px solid #1e293b;
            margin-bottom: 15px;
        }

        .four-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 28px;
            padding: 0 10px;
            pointer-events: none;
        }

        .line-red { border-top: 2px solid #ff4d4d; width: 100%; }
        .line-blue { border-top: 2px solid #3399ff; width: 100%; }

        .content-box {
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            width: 100%;
            padding: 0 20px;
        }

        .letter-display {
            font-size: 90px;
            font-weight: 800;
            color: #1e293b;
            line-height: 1;
        }

        .object-emoji {
            font-size: 70px;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .sound-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: #00f2fe;
            color: #0f172a;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            z-index: 5;
        }

        /* 🎮 नेव्हिगेशन बटणे */
        .nav-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 420px;
            margin-bottom: 15px;
        }

        .nav-btn {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .nav-btn.next {
            background: #00f2fe;
            color: #0f172a;
            border: none;
        }

        /* ⌨️ एबीसीडी कीपॅड ग्रिड */
        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 420px;
        }

        .key-btn {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.06);
            color: #fff;
            height: 50px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .key-btn.active {
            background: transparent;
            border: 2px solid #00f2fe;
            color: #00f2fe;
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.2);
        }

        .key-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">⬅ Home</a>
        <div style="font-size: 16px; font-weight: 800; color: #00f2fe;">✨ English Phonics Shala</div>
        <div style="width:50px;"></div>
    </header>

    <div class="game-link-box">
        <a href="fruit_vegetable_flower_body_part.html" class="game-menu-btn">
            🍎 Learn Words (Fruits, Vegetables, Flowers & Body Parts) ➡️
        </a>
    </div>

    <div class="mode-container">
        <button class="mode-btn active" id="btn-capital" onclick="setMode('capital')">🅰 Capital</button>
        <button class="mode-btn" id="btn-small" onclick="setMode('small')">a Small</button>
    </div>

    <div class="display-card" onclick="playPhonics()">
        <div class="four-lines">
            <div class="line-red"></div>
            <div class="line-blue"></div>
            <div class="line-blue"></div>
            <div class="line-red"></div>
        </div>
        
        <div class="content-box">
            <div class="letter-display" id="letter-view">A</div>
            <div class="object-emoji" id="emoji-view">🍎</div>
        </div>

        <div class="sound-badge">🔊 Sound</div>
    </div>

    <div class="nav-container">
        <button class="nav-btn" onclick="navigateLetter(-1)">⬅ Back</button>
        <button class="nav-btn next" onclick="navigateLetter(1)">Next ➡️</button>
    </div>

    <div class="keyboard-grid" id="keyboard-box"></div>

<script>
    let currentIndex = 0;
    let currentMode = 'capital'; 

    const alphabetData = [
        { cap: 'A', sm: 'a', emoji: '🍎', phonic: 'A for Apple... aa aa aa' },
        { cap: 'B', sm: 'b', emoji: '🎈', phonic: 'B for Balloon... ba ba ba' },
        { cap: 'C', sm: 'c', emoji: '🐱', phonic: 'C for Cat... ka ka ka' },
        { cap: 'D', sm: 'd', emoji: '🐕', phonic: 'D for Dog... da da da' },
        { cap: 'E', sm: 'e', emoji: '🥚', phonic: 'E for Egg... ae ae ae' },
        { cap: 'F', sm: 'f', emoji: '🐟', phonic: 'F for Fish... fa fa fa' },
        { cap: 'G', sm: 'g', emoji: '🍇', phonic: 'G for Grapes... ga ga ga' },
        { cap: 'H', sm: 'h', emoji: '🏠', phonic: 'H for House... ha ha ha' },
        { cap: 'I', sm: 'i', emoji: '🍦', phonic: 'I for Ice cream... ee ee ee' },
        { cap: 'J', sm: 'j', emoji: '🃏', phonic: 'J for Joker... ja ja ja' },
        { cap: 'K', sm: 'k', emoji: '🪁', phonic: 'K for Kite... ka ka ka' },
        { cap: 'L', sm: 'l', emoji: '🦁', phonic: 'L for Lion... la la la' },
        { cap: 'M', sm: 'm', emoji: '🐒', phonic: 'M for Monkey... ma ma ma' },
        { cap: 'N', sm: 'n', emoji: '🪺', phonic: 'N for Nest... na na na' },
        { cap: 'O', sm: 'o', emoji: '🍊', phonic: 'O for Orange... aw aw aw' },
        { cap: 'P', sm: 'p', emoji: '🦜', phonic: 'P for Parrot... pa pa pa' },
        { cap: 'Q', sm: 'q', emoji: '👑', phonic: 'Q for Queen... qua qua qua' },
        { cap: 'R', sm: 'r', emoji: '🌹', phonic: 'R for Rose... ra ra ra' },
        { cap: 'S', sm: 's', emoji: '☀️', phonic: 'S for Sun... sa sa sa' },
        { cap: 'T', sm: 't', emoji: '🐯', phonic: 'T for Tiger... ta ta ta' },
        { cap: 'U', sm: 'u', emoji: '☂️', phonic: 'U for Umbrella... uh uh uh' },
        { cap: 'V', sm: 'v', emoji: '🚐', phonic: 'V for Van... va va va' },
        { cap: 'W', sm: 'w', emoji: '⌚', phonic: 'W for Watch... wa wa wa' },
        { cap: 'X', sm: 'x', emoji: '🎄', phonic: 'X for Xmas Tree... ks ks ks' },
        { cap: 'Y', sm: 'y', emoji: '🪵', phonic: 'Y for Yak... ya ya ya' },
        { cap: 'Z', sm: 'z', emoji: '🦓', phonic: 'Z for Zebra... za za za' }
    ];

    let synth = window.speechSynthesis;

    function renderKeyboard() {
        let keyboardBox = document.getElementById("keyboard-box");
        keyboardBox.innerHTML = "";
        
        alphabetData.forEach((item, index) => {
            let btn = document.createElement("button");
            btn.className = "key-btn";
            if(index === currentIndex) btn.classList.add("active");
            
            btn.innerText = currentMode === 'capital' ? item.cap : item.sm;
            btn.onclick = () => selectLetter(index);
            keyboardBox.appendChild(btn);
        });
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById("btn-capital").classList.toggle("active", mode === 'capital');
        document.getElementById("btn-small").classList.toggle("active", mode === 'small');
        updateDisplay();
    }

    function selectLetter(index) {
        currentIndex = index;
        updateDisplay();
        playPhonics();
    }

    function navigateLetter(step) {
        currentIndex += step;
        if(currentIndex < 0) currentIndex = 25;
        if(currentIndex > 25) currentIndex = 0;
        updateDisplay();
        playPhonics();
    }

    function updateDisplay() {
        let currentItem = alphabetData[currentIndex];
        document.getElementById("letter-view").innerText = currentMode === 'capital' ? currentItem.cap : currentItem.sm;
        document.getElementById("emoji-view").innerText = currentItem.emoji;
        
        let keys = document.querySelectorAll(".key-btn");
        keys.forEach((key, idx) => {
            key.classList.toggle("active", idx === currentIndex);
            key.innerText = currentMode === 'capital' ? alphabetData[idx].cap : alphabetData[idx].sm;
        });
    }

    function playPhonics() {
        if (!synth) return;
        synth.cancel(); 

        let currentItem = alphabetData[currentIndex];
        let utter = new SpeechSynthesisUtterance(currentItem.phonic);
        
        utter.lang = 'en-US';
        utter.rate = 0.75; 
        utter.pitch = 1.1; 
        
        synth.speak(utter);
    }

    window.onload = () => {
        renderKeyboard();
        updateDisplay();
    };
</script>
</body>
</html>
